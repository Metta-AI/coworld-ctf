:root {
  --stage-lo: #16110d;
  --stage-hi: #241a12;
  --paper: #f2e8d8;
  --paper-dim: #b8ac98;
  --ink: #2a1f16;
  --ink-soft: rgba(20, 14, 9, 0.62);
  --red: #e0523a;
  --blue: #3f7cc4;
  --amber: #e8a33d;
  --ghost: #8a7f72;
  --hudscale: 1;
  /* chrome measures derive off the CONTAINER via --hudscale, not the viewport */
  --u: calc(1px * var(--hudscale));
  --pixfont: 'nes-pixel', 'Courier New', monospace;
  --finefont: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  /* The letterbox around the composition — warm near-black, NEVER pure #000.
     The Observatory embed hands us an arbitrary box; the fixed-aspect stage is
     centered inside it and this warm tone fills whatever is left over. */
  background: #120d09;
  color: var(--paper);
  font-family: var(--finefont);
  -webkit-font-smoothing: antialiased;
}

/* The embed box. The stage is ONE fixed-aspect composition centered inside it;
   board + every overlay live in the stage and scale together as a single unit
   (§2/L82: chrome sizes off the CONTAINER, not the viewport), so overlays never
   drift from the graphics at any embed size. */
#viewport {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#stage {
  position: relative;
  /* width/height are set in px by relayout() to the board's native aspect
     (1235:659) fitted into #viewport; the canvas fills it exactly (matching
     aspect → no internal letterbox) and all chrome is pinned in this space. */
  width: 100%;
  height: 100%;
  background:
    radial-gradient(120% 90% at 50% 38%, var(--stage-hi) 0%, var(--stage-lo) 72%);
  overflow: hidden;
}

/* The board fills the frame ABOVE the reserved transport band; broadcast_core
   letterboxes it to native aspect. --band is the bottom strip (set by relayout)
   where the transport lives, so no chrome ever sits over play. */
#board {
  position: absolute;
  left: 0;
  /* canvas is a replaced element: `inset` won't stretch it, so size explicitly.
     The board sits BETWEEN the reserved scorebug band (top) and transport band
     (bottom), so no chrome ever overlaps play. */
  top: var(--topband, 0px);
  width: 100%;
  height: calc(100% - var(--topband, 0px) - var(--band, 0px));
  display: block;
  image-rendering: pixelated;
}

/* A soft light pool focuses the eye on the arena (not a literal set). Matches
   the board area so it never darkens the reserved transport band below. */
#lightpool {
  position: absolute;
  inset: var(--topband, 0px) 0 var(--band, 0px) 0;
  pointer-events: none;
  background:
    radial-gradient(70% 58% at 50% 46%, transparent 40%, rgba(12, 8, 5, 0.34) 100%);
  z-index: 2;
}

/* CRT phosphor grain drift — ambient, paused under prefers-reduced-motion. */
#grain {
  position: absolute;
  inset: -20%;
  pointer-events: none;
  opacity: 0.05;
  z-index: 3;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.5) 0 1px, transparent 1px 3px);
  animation: graindrift 7s steps(4) infinite;
}
@keyframes graindrift { to { transform: translateY(3px); } }

#chrome {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  font-family: var(--pixfont);
}
#chrome > * { pointer-events: auto; }

/* ---------- 1. TOP-BAND SCOREBUG ---------- */
#scorebug {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: grid;
  /* minmax(0,1fr), NOT 1fr: a bare 1fr track floors at its content's min-content
     width, so a long team name would blow the side track out and shove the center
     clock off-center. minmax(0,…) lets each side shrink to 0 and clip via the
     name's own ellipsis at the TRUE track edge — the name then uses all the plate
     room there actually is, instead of an arbitrary hard cap. */
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  align-items: stretch;
  /* Shrink the whole scorebug group (names, lives numerals, labels, squad pips,
     clock) 20% by scaling the local unit — every measure below derives from --u,
     so one override rescales the band without touching per-element sizes. */
  --u: calc(1px * var(--hudscale) * 0.8);
  gap: calc(6 * var(--u));
  padding: calc(6 * var(--u)) calc(12 * var(--u)) calc(7 * var(--u));
  /* Dedicated top band: a solid warm-dark strip that lives ABOVE the board (its
     measured height = --topband, reserved by relayout), so the scorebug never
     covers play — grenades/players at the top rows stay fully visible. Mirrors
     the bottom transport band. */
  box-sizing: border-box;
  background: var(--stage-lo);
  box-shadow: inset 0 calc(-1 * var(--u)) 0 rgba(242, 232, 216, 0.06);
}

.plate {
  display: flex;
  align-items: center;
  gap: calc(9 * var(--u));
  min-width: 0;
}
.plate.blue { flex-direction: row-reverse; text-align: right; }

.plate .team-id { min-width: 0; }
.plate .team-name {
  font-family: var(--pixfont);
  font-size: calc(16 * var(--u));
  letter-spacing: 0.5px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  /* Inline with Lives + count on ONE row. Let the name shrink and ellipsis so a
     long policy name never pushes the label/count off the plate; the label and
     numeral hold their size. Full name still reads in the CARRYING line + roster.
     No max-width: the minmax(0,1fr) side track already bounds it, so the name
     grows to the full plate width and only ellipsizes when it genuinely runs out
     of room — not at an arbitrary early cap. */
  flex: 0 1 auto;
  min-width: 0;
  text-shadow: 0 calc(2 * var(--u)) 0 var(--ink);
}
.plate.red .team-name { color: var(--red); }
.plate.blue .team-name { color: var(--blue); }

/* One baseline row with the COLOR NAME innermost (toward the center clock):
   left plate reads "32 LIVES RED", right plate reads "BLUE LIVES 32", so both
   names flank the clock. Red reverses; blue keeps DOM order (name → label → num). */
.plate .lives-line {
  display: flex;
  align-items: baseline;
  gap: calc(6 * var(--u));
}
.plate.red .lives-line { flex-direction: row-reverse; }
.lives-num {
  font-family: var(--pixfont);
  font-size: calc(20 * var(--u));
  line-height: 1;
  color: var(--paper);
  flex: none;
}
.lives-label {
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--paper-dim);
  flex: none;
}
/* Squad strip: ONE pip per player (8). Lit = alive, dim = down-but-has-lives,
   hollow = eliminated. The strip is the "who's left" read; the big numeral is
   the exact lives count. Each pip is clickable → POV lens (fog-honesty). */
.squad {
  display: flex;
  gap: calc(3 * var(--u));
  margin-top: calc(3 * var(--u));
}
.plate.blue .squad { justify-content: flex-end; }
.squad-pip {
  width: calc(9 * var(--u));
  height: calc(9 * var(--u));
  background: currentColor;
  opacity: 0.92;
  cursor: pointer;
  position: relative;
  transition: opacity 140ms, transform 140ms;
}
.squad-pip:hover { transform: translateY(calc(-1 * var(--u))); }
.squad-pip.down { opacity: 0.3; }                              /* dead, lives left */
.squad-pip.out {                                              /* eliminated */
  background: transparent;
  box-shadow: inset 0 0 0 calc(1.5 * var(--u)) currentColor;
  opacity: 0.28;
}
.squad-pip.carry {                                            /* has the flag */
  background: var(--amber);
  box-shadow: 0 0 calc(7 * var(--u)) var(--amber);
}
.squad-pip.pov {                                             /* POV lens active */
  box-shadow: 0 0 0 calc(1.5 * var(--u)) var(--paper);
}
.plate.red .squad { color: var(--red); }
.plate.blue .squad { color: var(--blue); }

/* flag-state icon — HOME (on pedestal) / TAKEN (riding a carrier). F2: two states only. */
.flagicon {
  position: relative;
  width: calc(26 * var(--u));
  height: calc(30 * var(--u));
  flex: none;
}
.flagicon svg { width: 100%; height: 100%; display: block; }
/* transform-box:fill-box so SVG transforms pivot about the cloth's own box,
   not the viewBox edge (else the flip mirrors off-screen — invisible-at-vote). */
.flagicon .cloth { transition: transform 90ms steps(3); transform-box: fill-box; transform-origin: left center; }
.flagicon.taken .cloth { transform: scaleX(0.62) skewX(-8deg); }
.flagicon.flip { animation: flagflip 260ms steps(3); transform-box: fill-box; transform-origin: center; }
@keyframes flagflip { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }
.flagicon .carrier-tag {
  position: absolute;
  bottom: calc(-11 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.08em;
  white-space: nowrap;
  color: var(--amber);
  text-transform: uppercase;
}

/* center clock pill + phase */
.clock {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: calc(3 * var(--u));
  padding-top: calc(1 * var(--u));
}
.clock .time {
  font-family: var(--pixfont);
  /* The clock is the centerpiece: with the name folded into the lives row the
     side plates are one row shorter, so grow the time numeral into that freed
     vertical space and let it anchor the band. */
  font-size: calc(30 * var(--u));
  line-height: 1;
  color: var(--paper);
  text-shadow: 0 calc(2 * var(--u)) 0 var(--ink);
  font-variant-numeric: tabular-nums;
}
.clock .caption {
  font-family: var(--finefont);
  font-size: calc(8.5 * var(--u));
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--paper-dim);
  white-space: nowrap;
}
.clock.tiebreak-warn .time { color: var(--amber); }

/* Center column holds just the clock now — the capture-chase gauge was retired
   in favor of the two bottom carry indicators. */
.clock-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: calc(4 * var(--u));
}

/* Clock pill soft tick — the third chrome ambient (§11). A near-imperceptible
   breathe on the pill, so the countdown reads as a live instrument, not a label. */
.clock.amb { animation: clocktick 2s ease-in-out infinite; }
@keyframes clocktick { 0%,100% { opacity: 0.94; } 50% { opacity: 1; } }

/* leader pulse when a team's lives lead is >=3 */
.plate.leader .lives-num { animation: leaderpulse 1.9s ease-in-out infinite; }
@keyframes leaderpulse { 0%,100% { text-shadow: none; } 50% { text-shadow: 0 0 calc(10 * var(--u)) var(--amber); } }

/* Beat-pause (§11): idle systems freeze the instant a beat lands, so ambient
   never competes with a kill/steal/capture for the eye. Applied on #stage; the
   engine-driven board (24Hz) is untouched — only chrome ambient pauses. */
#stage.beat-active .amb,
#stage.beat-active .plate.leader .lives-num { animation-play-state: paused; }

/* ---------- 3. BANNER LANE ---------- */
#bannerlane {
  position: absolute;
  top: calc(78 * var(--u));
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: 12;
  min-height: calc(26 * var(--u)); /* reserved slot: layout never jumps */
}
.banner-chip {
  font-family: var(--pixfont);
  font-size: calc(13 * var(--u));
  letter-spacing: 0.06em;
  padding: calc(6 * var(--u)) calc(14 * var(--u));
  color: var(--paper);
  background: var(--ink-soft);
  border-bottom: calc(3 * var(--u)) solid var(--amber);
  text-transform: uppercase;
  white-space: nowrap;
  animation: chippop 300ms cubic-bezier(.2,1.4,.4,1);
}
.banner-chip.steal { border-bottom-color: var(--amber); }
.banner-chip.returned { border-bottom-color: var(--paper-dim); }
.banner-chip.wipe { border-bottom-color: var(--red); font-size: calc(15 * var(--u)); }
.banner-chip.red-accent { box-shadow: inset calc(4 * var(--u)) 0 0 var(--red); }
.banner-chip.blue-accent { box-shadow: inset calc(4 * var(--u)) 0 0 var(--blue); }
.banner-chip.leaving { animation: chipfade 260ms ease-in forwards; }
@keyframes chippop { from { transform: translateY(calc(-8 * var(--u))) scale(0.9); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes chipfade { to { opacity: 0; transform: translateY(calc(-4 * var(--u))); } }

/* ---------- 2. KILL FEED ---------- */
#killfeed {
  position: absolute;
  /* Bottom-right, clear of the blue scorebug/roster (top) and the transport
     bar (bottom). column-reverse so the newest row sits lowest, nearest the
     transport, and older kills stack upward — a broadcast lower-third feed. */
  bottom: calc(76 * var(--u));
  right: calc(12 * var(--u));
  display: flex;
  flex-direction: column-reverse;
  gap: calc(4 * var(--u));
  align-items: flex-end;
  width: calc(228 * var(--u));
  min-height: calc(4 * 22 * var(--u)); /* fixed 4-row reserve */
  z-index: 11;
}
.feed-row {
  display: flex;
  align-items: center;
  gap: calc(5 * var(--u));
  padding: calc(3 * var(--u)) calc(7 * var(--u));
  background: var(--ink-soft);
  font-family: var(--pixfont);
  /* A touch smaller than the scorebug type so full 8-char names stay compact;
     everything is in --u so the row scales with the board (responsive). */
  font-size: calc(8 * var(--u));
  line-height: 1;
  /* Size to content so full names never truncate; rows are right-anchored
     (align-items:flex-end on #killfeed) so a long row grows leftward — bounded
     by the small font + the pre-bounded 10-char name, so it can't run away. */
  max-width: none;
  white-space: nowrap;
  animation: feedin 250ms cubic-bezier(.2,1.3,.5,1);
}
.feed-row.leaving { animation: feedout 260ms ease-in forwards; }
@keyframes feedin { from { transform: translateX(calc(30 * var(--u))); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes feedout { to { opacity: 0; transform: translateX(calc(14 * var(--u))); } }
.feed-row .who { white-space: nowrap; }  /* names are pre-bounded to 10 chars by shortName(); show in full, never ellipsize */
.feed-row .who.red { color: var(--red); }
.feed-row .who.blue { color: var(--blue); }
.feed-row .glyph { color: var(--paper); font-size: calc(9 * var(--u)); }
.feed-row .badge {
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: calc(1 * var(--u)) calc(4 * var(--u));
  color: var(--stage-lo);
  background: var(--amber);
}
.feed-row .badge.tk { background: var(--red); color: var(--paper); }
.feed-row .badge.carrier { background: var(--amber); }
.feed-row.flagkill { box-shadow: inset 0 calc(-2 * var(--u)) 0 var(--amber); }

/* Roster rails removed: per-player state now rides the scorebug squad strip
   (the roster IS the counter, genre convention) and the board's own name tags.
   No floating bordered rails over the arena flanks (in-world, no HUD chrome). */

/* POV eye badge shown when a slot is inspected (fog-honesty lens) */
#povBadge {
  position: absolute;
  top: calc(64 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  display: none;
  align-items: center;
  gap: calc(5 * var(--u));
  padding: calc(3 * var(--u)) calc(9 * var(--u));
  background: var(--ink-soft);
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  z-index: 12;
  cursor: pointer;
}
#povBadge.on { display: flex; }

/* First-person PiP inset: pinned bottom-right, responsive width (§2 — sized off
   the stage so it scales with the composition). Hidden until a seat is in POV.
   One quiet hairline frames it as a genuine window, not a decorative card. */
#fpv {
  position: absolute;
  right: calc(12 * var(--u));
  bottom: calc(64 * var(--u));
  width: 26%;
  min-width: calc(120 * var(--u));
  max-width: calc(300 * var(--u));
  aspect-ratio: 3 / 2;
  display: none;
  z-index: 11;
  background: rgba(12, 9, 6, 0.66);
  box-shadow: 0 0 0 1px rgba(232, 163, 61, 0.4),
    0 calc(6 * var(--u)) calc(18 * var(--u)) rgba(8, 5, 3, 0.5);
  overflow: hidden;
  /* Slightly see-through so it never fully hides the arena beneath, and
     draggable: grab it anywhere to reposition (the caption is the handle hint). */
  opacity: 0.86;
  cursor: grab;
  transition: opacity 0.12s ease;
}
#fpv.on { display: block; }
#fpv:hover { opacity: 1; }
#fpv.dragging { cursor: grabbing; opacity: 1; }
/* Once the viewer has dragged it, we pin via left/top and drop the right/bottom
   anchor so the two don't fight. */
#fpv.moved { right: auto; bottom: auto; }
#fpv-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  pointer-events: none;   /* clicks fall through to the frame for dragging */
}
.fpv-cap {
  position: absolute;
  left: calc(6 * var(--u));
  top: calc(4 * var(--u));
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--amber);
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
  pointer-events: none;
  opacity: 0.85;
}

/* ---------- 5. TRANSPORT ---------- */
#transport {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  /* Sits in the reserved band BELOW the board — relayout() measures this strip's
     natural height and reserves that much (--band) at the bottom of the frame, so
     the scrubber and buttons never overlap play. A solid warm-dark strip, not a
     fade — there is no arena underneath it to wash over. */
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: calc(5 * var(--u));
  padding: calc(8 * var(--u)) calc(12 * var(--u)) calc(8 * var(--u));
  background: var(--stage-lo);
  box-shadow: inset 0 calc(1 * var(--u)) 0 rgba(242, 232, 216, 0.06);
}
#transport.disabled { opacity: 0.35; pointer-events: none; }

/* scrubber: click-to-seek track (top) over a full-timeline momentum graph.
   The seek track and the momentum graph share the SAME 0→maxTicks x-axis, so
   the playhead crosses the graph 1:1 with the timeline (no scrolling window). */
.scrub {
  position: relative;
  height: calc(34 * var(--u));
  cursor: pointer;
}
.scrub-track {
  position: absolute;
  left: 0; right: 0; top: calc(6 * var(--u));
  height: calc(4 * var(--u));
  background: rgba(242, 232, 216, 0.16);
}
.scrub-fill {
  position: absolute;
  left: 0; top: calc(6 * var(--u));
  height: calc(4 * var(--u));
  background: var(--paper);
  width: 0;
}
.scrub-head {
  /* spans track + graph so the playhead reads against the momentum curve */
  position: absolute;
  top: calc(2 * var(--u));
  width: calc(3 * var(--u));
  height: calc(30 * var(--u));
  background: var(--amber);
  transform: translateX(calc(-1.5 * var(--u)));
  left: 0;
  z-index: 3;
}
/* Full-timeline lives-lead graph, occupying the band UNDER the seek track. */
.momentum {
  position: absolute;
  /* An inline <svg> is a REPLACED element: with width:auto it takes its
     intrinsic viewBox ratio (1000×100 = 10:1) × height, NOT the left/right
     box — so it renders ~10× its height wide (a short stub) instead of full
     width. Pin width:100% so it spans the whole seek track, matching the
     0→maxTicks x-axis the playhead rides. (preserveAspectRatio:none, so no
     letterboxing when we override the ratio.) */
  left: 0; width: 100%; top: calc(12 * var(--u));
  height: calc(22 * var(--u));
  display: block;
  overflow: visible;
}
.momentum-label {
  position: absolute;
  left: 0; top: calc(13 * var(--u));
  font-family: var(--finefont);
  font-size: calc(6 * var(--u));
  letter-spacing: 0.12em;
  color: var(--paper-dim);
  opacity: 0.5;
  pointer-events: none;
  z-index: 2;
}
.beat-marker {
  position: absolute;
  top: 0;
  width: calc(2 * var(--u));
  height: calc(10 * var(--u));
  transform: translateX(-1px);
  z-index: 2;
}
.beat-marker.kill { background: var(--paper-dim); }
.beat-marker.steal { background: var(--amber); }
.beat-marker.capture { background: var(--red); }

.tbar {
  display: flex;
  align-items: center;
  gap: calc(5 * var(--u));
  flex-wrap: wrap;
}
.tbtn {
  font-family: var(--pixfont);
  font-size: calc(11 * var(--u));
  color: var(--paper);
  background: rgba(242, 232, 216, 0.08);
  border: none;
  padding: calc(5 * var(--u)) calc(8 * var(--u));
  min-width: calc(26 * var(--u));
  cursor: pointer;
  line-height: 1;
}
.tbtn:hover { background: rgba(242, 232, 216, 0.2); }
.tbtn.on { color: var(--amber); box-shadow: inset 0 calc(-2 * var(--u)) 0 var(--amber); }
.tbtn svg { width: calc(12 * var(--u)); height: calc(12 * var(--u)); display: block; fill: currentColor; }
.tsep { flex: 1; }
.speedchips { display: flex; gap: calc(2 * var(--u)); }
.chip {
  font-family: var(--pixfont);
  font-size: calc(9 * var(--u));
  color: var(--paper-dim);
  background: rgba(242, 232, 216, 0.06);
  border: none;
  padding: calc(4 * var(--u)) calc(5 * var(--u));
  cursor: pointer;
  line-height: 1;
}
.chip.on { color: var(--stage-lo); background: var(--amber); }
.tick-clock {
  font-family: var(--pixfont);
  font-size: calc(9 * var(--u));
  color: var(--paper-dim);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* hash-mismatch warning (top center) — honest fidelity flag */
#mmwarn {
  position: absolute;
  top: calc(40 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  display: none;
  padding: calc(3 * var(--u)) calc(9 * var(--u));
  background: var(--red);
  color: var(--paper);
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 20;
}
#mmwarn.on { display: block; }

/* ---------- 6. END-CARD ---------- */
#endcard {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: calc(12 * var(--u));
  background: radial-gradient(80% 70% at 50% 45%, rgba(16, 11, 7, 0.82), rgba(9, 6, 3, 0.95));
  z-index: 30;
  padding: calc(20 * var(--u));
  text-align: center;
}
#endcard.on { display: flex; animation: cardfade 420ms ease-out; }
@keyframes cardfade { from { opacity: 0; } to { opacity: 1; } }
#endcard .verdict-badge {
  font-family: var(--pixfont);
  font-size: calc(13 * var(--u));
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: calc(5 * var(--u)) calc(14 * var(--u));
  color: var(--stage-lo);
}
#endcard .verdict-badge.red { background: var(--red); color: var(--paper); }
#endcard .verdict-badge.blue { background: var(--blue); color: var(--paper); }
#endcard .verdict-badge.draw { background: var(--ghost); color: var(--stage-lo); }
#endcard .headline {
  font-family: var(--pixfont);
  font-size: calc(30 * var(--u));
  line-height: 1.05;
  color: var(--paper);
  text-shadow: 0 calc(3 * var(--u)) 0 var(--ink);
}
#endcard .how {
  font-family: var(--finefont);
  font-size: calc(11 * var(--u));
  letter-spacing: 0.05em;
  color: var(--paper-dim);
  max-width: calc(360 * var(--u));
}
#endcard .final-lives {
  display: flex;
  gap: calc(30 * var(--u));
  align-items: baseline;
  font-family: var(--pixfont);
}
#endcard .fl-team { display: flex; flex-direction: column; align-items: center; gap: calc(3 * var(--u)); }
#endcard .fl-num { font-size: calc(26 * var(--u)); }
#endcard .fl-num.red { color: var(--red); }
#endcard .fl-num.blue { color: var(--blue); }
#endcard .fl-cap {
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--paper-dim);
}

/* connection status — fine print, lower-left */
#status {
  position: absolute;
  left: calc(10 * var(--u));
  bottom: calc(62 * var(--u));
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ghost);
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 200ms;
}
#status.show { opacity: 1; }

/* ============================================================
   The replay is ONE fixed-aspect composition (relayout() sizes #stage to the
   board's 1235:659 aspect inside the embed box), so there is no portrait/reflow
   case: at every container shape the board and its overlays scale together as a
   single unit and stay pinned. The only responsive lever is chrome DENSITY —
   `.tiny` eases the reserves so the 640×360 floor stays legible.
   ============================================================ */
/* very small floor (≤620px stage): tighten reserves */
#stage.tiny #killfeed { min-height: calc(3 * 20 * var(--u)); width: calc(190 * var(--u)); }
#stage.tiny .plate .squad-pip { width: calc(6 * var(--u)); height: calc(6 * var(--u)); }

@media (prefers-reduced-motion: reduce) {
  #grain, .clock.amb { animation: none; }
  .plate.leader .lives-num { animation: none; }
  .banner-chip, .feed-row { animation-duration: 1ms; }
}

/* ============================================================
   EMBED MODE — inside the League Replayer shell (?embed=1)
   The shell owns the walls + team headers + KDA + standings + transport, drawn
   from the postMessage frame stream. Here we show the board (the lit pit floor)
   PLUS the designed broadcast feedback layer that belongs over the play area —
   the kill feed and the flag-event banner lane (lower-third / center wipes).
   We hide only the chrome the shell re-draws (scorebug/transport) and the
   ambient light-pool/grain/status, and let the board fill the embed box.
   ============================================================ */
body[data-embed] #scorebug,
body[data-embed] #transport,
body[data-embed] #lightpool,
body[data-embed] #grain,
body[data-embed] #status { display: none !important; }
body[data-embed] #board { top: 0; height: 100%; }
</style>
</head>
<body>
<div id="viewport">
<div id="stage">
  <canvas id="board"></canvas>
  <div id="lightpool"></div>
  <div id="grain" class="amb"></div>

  <div id="chrome">
    <div id="scorebug">
      <div class="plate red" data-team="red">
        <div class="flagicon" id="flag-red"></div>
        <div class="team-id">
          <!-- One inline row: NAME · Lives · count (e.g. "RED Lives 32"). -->
          <div class="lives-line">
            <span class="team-name" id="name-red">RED</span>
            <span class="lives-label">Lives</span>
            <span class="lives-num" id="lives-red">—</span>
          </div>
          <!-- one pip per player (8): alive / down / eliminated. The roster IS
               the counter (Valorant/R6/Apex). Clickable → POV lens. -->
          <div class="squad" id="squad-red"></div>
        </div>
      </div>

      <div class="clock-col">
        <div class="clock amb" id="clock">
          <div class="time" id="clock-time">0:00</div>
          <div class="caption" id="clock-caption">Warming up</div>
        </div>
      </div>

      <div class="plate blue" data-team="blue">
        <div class="flagicon" id="flag-blue"></div>
        <div class="team-id">
          <!-- One inline row, mirrored: count · Lives · NAME ("32 Lives BLUE"). -->
          <div class="lives-line">
            <span class="team-name" id="name-blue">BLUE</span>
            <span class="lives-label">Lives</span>
            <span class="lives-num" id="lives-blue">—</span>
          </div>
          <div class="squad" id="squad-blue"></div>
        </div>
      </div>
    </div>

    <div id="mmwarn">Replay hash mismatch — showing recorded inputs</div>
    <div id="povBadge">👁 POV lens — click to clear</div>
    <!-- First-person picture-in-picture: the selected seat's Wolfenstein-style
         raycast view, shown only while a player is in POV. A window into what
         that soldier sees down the barrel, riding alongside their top-down fog. -->
    <div id="fpv">
      <canvas id="fpv-canvas"></canvas>
      <div class="fpv-cap" id="fpv-cap">EYES</div>
    </div>
    <div id="bannerlane"></div>
    <div id="killfeed"></div>

    <div id="transport">
      <!-- Buttons on top, scrubber/timeline below (the transport sits in its own
           reserved band under the board, so nothing here overlaps play). -->
      <div class="tbar">
        <button class="tbtn" id="btn-restart" title="Restart (,)">⟲</button>
        <button class="tbtn" id="btn-back" title="Back one tick (b)">◂|</button>
        <button class="tbtn" id="btn-play" title="Play / pause (space)">▶</button>
        <button class="tbtn" id="btn-fwd" title="Skip +5s (.)">+5s</button>
        <button class="tbtn" id="btn-end" title="Jump to end (e)">|▸</button>
        <button class="tbtn" id="btn-loop" title="Loop (r)">↻</button>
