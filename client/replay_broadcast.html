:root {
  --stage-lo: #16110d;
  --stage-hi: #241a12;
  --paper: #f2e8d8;
  --paper-dim: #b8ac98;
  --ink: #2a1f16;
  --ink-soft: rgba(20, 14, 9, 0.62);
  --red: #e0523a;
  --blue: #3f7cc4;
  --amber: #e8a33d;
  --ghost: #8a7f72;
  --hudscale: 1;
  /* chrome measures derive off the CONTAINER via --hudscale, not the viewport */
  --u: calc(1px * var(--hudscale));
  --pixfont: 'nes-pixel', 'Courier New', monospace;
  --finefont: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  /* The letterbox around the composition — warm near-black, NEVER pure #000.
     The Observatory embed hands us an arbitrary box; the fixed-aspect stage is
     centered inside it and this warm tone fills whatever is left over. */
  background: #120d09;
  color: var(--paper);
  font-family: var(--finefont);
  -webkit-font-smoothing: antialiased;
}

/* The embed box. The stage is ONE fixed-aspect composition centered inside it;
   board + every overlay live in the stage and scale together as a single unit
   (§2/L82: chrome sizes off the CONTAINER, not the viewport), so overlays never
   drift from the graphics at any embed size. */
#viewport {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#stage {
  position: relative;
  /* width/height are set in px by relayout() to the board's native aspect
     (1235:659) fitted into #viewport; the canvas fills it exactly (matching
     aspect → no internal letterbox) and all chrome is pinned in this space. */
  width: 100%;
  height: 100%;
  background:
    radial-gradient(120% 90% at 50% 38%, var(--stage-hi) 0%, var(--stage-lo) 72%);
  overflow: hidden;
}

/* The board fills the frame; broadcast_core letterboxes it to native aspect. */
#board {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
}

/* A soft light pool focuses the eye on the arena (not a literal set). */
#lightpool {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(70% 58% at 50% 46%, transparent 40%, rgba(12, 8, 5, 0.34) 100%);
  z-index: 2;
}

/* CRT phosphor grain drift — ambient, paused under prefers-reduced-motion. */
#grain {
  position: absolute;
  inset: -20%;
  pointer-events: none;
  opacity: 0.05;
  z-index: 3;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.5) 0 1px, transparent 1px 3px);
  animation: graindrift 7s steps(4) infinite;
}
@keyframes graindrift { to { transform: translateY(3px); } }

#chrome {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  font-family: var(--pixfont);
}
#chrome > * { pointer-events: auto; }

/* ---------- 1. TOP-BAND SCOREBUG ---------- */
#scorebug {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: stretch;
  gap: calc(6 * var(--u));
  padding: calc(9 * var(--u)) calc(12 * var(--u)) calc(16 * var(--u));
  background: linear-gradient(to bottom, rgba(11, 7, 4, 0.86) 0%, rgba(11, 7, 4, 0.38) 70%, transparent 100%);
}

.plate {
  display: flex;
  align-items: center;
  gap: calc(9 * var(--u));
  min-width: 0;
}
.plate.blue { flex-direction: row-reverse; text-align: right; }

.plate .team-id { min-width: 0; }
.plate .team-name {
  font-family: var(--pixfont);
  font-size: calc(15 * var(--u));
  letter-spacing: 0.5px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: calc(150 * var(--u));
  text-shadow: 0 calc(2 * var(--u)) 0 var(--ink);
}
.plate.red .team-name { color: var(--red); }
.plate.blue .team-name { color: var(--blue); }

.plate .lives-line {
  display: flex;
  align-items: baseline;
  gap: calc(6 * var(--u));
  margin-top: calc(4 * var(--u));
}
.plate.blue .lives-line { flex-direction: row-reverse; }
.lives-num {
  font-family: var(--pixfont);
  font-size: calc(20 * var(--u));
  line-height: 1;
  color: var(--paper);
}
.lives-label {
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--paper-dim);
}
/* Squad strip: ONE pip per player (8). Lit = alive, dim = down-but-has-lives,
   hollow = eliminated. The strip is the "who's left" read; the big numeral is
   the exact lives count. Each pip is clickable → POV lens (fog-honesty). */
.squad {
  display: flex;
  gap: calc(3 * var(--u));
  margin-top: calc(6 * var(--u));
}
.plate.blue .squad { justify-content: flex-end; }
.squad-pip {
  width: calc(9 * var(--u));
  height: calc(9 * var(--u));
  background: currentColor;
  opacity: 0.92;
  cursor: pointer;
  position: relative;
  transition: opacity 140ms, transform 140ms;
}
.squad-pip:hover { transform: translateY(calc(-1 * var(--u))); }
.squad-pip.down { opacity: 0.3; }                              /* dead, lives left */
.squad-pip.out {                                              /* eliminated */
  background: transparent;
  box-shadow: inset 0 0 0 calc(1.5 * var(--u)) currentColor;
  opacity: 0.28;
}
.squad-pip.carry {                                            /* has the flag */
  background: var(--amber);
  box-shadow: 0 0 calc(7 * var(--u)) var(--amber);
}
.squad-pip.pov {                                             /* POV lens active */
  box-shadow: 0 0 0 calc(1.5 * var(--u)) var(--paper);
}
.plate.red .squad { color: var(--red); }
.plate.blue .squad { color: var(--blue); }

/* flag-state icon — HOME (on pedestal) / TAKEN (riding a carrier). F2: two states only. */
.flagicon {
  position: relative;
  width: calc(26 * var(--u));
  height: calc(30 * var(--u));
  flex: none;
}
.flagicon svg { width: 100%; height: 100%; display: block; }
/* transform-box:fill-box so SVG transforms pivot about the cloth's own box,
   not the viewBox edge (else the flip mirrors off-screen — invisible-at-vote). */
.flagicon .cloth { transition: transform 90ms steps(3); transform-box: fill-box; transform-origin: left center; }
.flagicon.taken .cloth { transform: scaleX(0.62) skewX(-8deg); }
.flagicon.flip { animation: flagflip 260ms steps(3); transform-box: fill-box; transform-origin: center; }
@keyframes flagflip { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }
.flagicon .carrier-tag {
  position: absolute;
  bottom: calc(-11 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.08em;
  white-space: nowrap;
  color: var(--amber);
  text-transform: uppercase;
}

/* center clock pill + phase */
.clock {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: calc(3 * var(--u));
  padding-top: calc(1 * var(--u));
}
.clock .time {
  font-family: var(--pixfont);
  font-size: calc(22 * var(--u));
  line-height: 1;
  color: var(--paper);
  text-shadow: 0 calc(2 * var(--u)) 0 var(--ink);
  font-variant-numeric: tabular-nums;
}
.clock .caption {
  font-family: var(--finefont);
  font-size: calc(7.5 * var(--u));
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--paper-dim);
  white-space: nowrap;
}
.clock.tiebreak-warn .time { color: var(--amber); }

/* Center column stacks the clock over the capture-chase gauge in a reserved
   slot, so the layout never jumps when a flag steal begins (L84). */
.clock-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: calc(4 * var(--u));
}
.chase {
  min-height: calc(15 * var(--u));   /* reserved: no layout jump on steal */
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: calc(3 * var(--u));
  opacity: 0;
  transition: opacity 180ms;
}
.chase.on { opacity: 1; }
.chase-bar {
  position: relative;
  width: calc(150 * var(--u));
  height: calc(6 * var(--u));
  background: rgba(242, 232, 216, 0.14);   /* faint paper track */
  overflow: hidden;
}
.chase-fill {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 0%;
  transition: width 180ms linear;
}
.chase.red .chase-fill { background: var(--red); }
.chase.blue .chase-fill { background: var(--blue); }
.chase.near .chase-fill { box-shadow: 0 0 calc(8 * var(--u)) var(--amber); }
.chase-label {
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  white-space: nowrap;
}

/* Clock pill soft tick — the third chrome ambient (§11). A near-imperceptible
   breathe on the pill, so the countdown reads as a live instrument, not a label. */
.clock.amb { animation: clocktick 2s ease-in-out infinite; }
@keyframes clocktick { 0%,100% { opacity: 0.94; } 50% { opacity: 1; } }

/* leader pulse when a team's lives lead is >=3 */
.plate.leader .lives-num { animation: leaderpulse 1.9s ease-in-out infinite; }
@keyframes leaderpulse { 0%,100% { text-shadow: none; } 50% { text-shadow: 0 0 calc(10 * var(--u)) var(--amber); } }

/* Beat-pause (§11): idle systems freeze the instant a beat lands, so ambient
   never competes with a kill/steal/capture for the eye. Applied on #stage; the
   engine-driven board (24Hz) is untouched — only chrome ambient pauses. */
#stage.beat-active .amb,
#stage.beat-active .plate.leader .lives-num { animation-play-state: paused; }

/* ---------- 3. BANNER LANE ---------- */
#bannerlane {
  position: absolute;
  top: calc(78 * var(--u));
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: 12;
  min-height: calc(26 * var(--u)); /* reserved slot: layout never jumps */
}
.banner-chip {
  font-family: var(--pixfont);
  font-size: calc(13 * var(--u));
  letter-spacing: 0.06em;
  padding: calc(6 * var(--u)) calc(14 * var(--u));
  color: var(--paper);
  background: var(--ink-soft);
  border-bottom: calc(3 * var(--u)) solid var(--amber);
  text-transform: uppercase;
  white-space: nowrap;
  animation: chippop 300ms cubic-bezier(.2,1.4,.4,1);
}
.banner-chip.steal { border-bottom-color: var(--amber); }
.banner-chip.returned { border-bottom-color: var(--paper-dim); }
.banner-chip.wipe { border-bottom-color: var(--red); font-size: calc(15 * var(--u)); }
.banner-chip.red-accent { box-shadow: inset calc(4 * var(--u)) 0 0 var(--red); }
.banner-chip.blue-accent { box-shadow: inset calc(4 * var(--u)) 0 0 var(--blue); }
.banner-chip.leaving { animation: chipfade 260ms ease-in forwards; }
@keyframes chippop { from { transform: translateY(calc(-8 * var(--u))) scale(0.9); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes chipfade { to { opacity: 0; transform: translateY(calc(-4 * var(--u))); } }

/* ---------- 2. KILL FEED ---------- */
#killfeed {
  position: absolute;
  /* Bottom-right, clear of the blue scorebug/roster (top) and the transport
     bar (bottom). column-reverse so the newest row sits lowest, nearest the
     transport, and older kills stack upward — a broadcast lower-third feed. */
  bottom: calc(76 * var(--u));
  right: calc(12 * var(--u));
  display: flex;
  flex-direction: column-reverse;
  gap: calc(4 * var(--u));
  align-items: flex-end;
  width: calc(228 * var(--u));
  min-height: calc(4 * 22 * var(--u)); /* fixed 4-row reserve */
  z-index: 11;
}
.feed-row {
  display: flex;
  align-items: center;
  gap: calc(5 * var(--u));
  padding: calc(3 * var(--u)) calc(7 * var(--u));
  background: var(--ink-soft);
  font-family: var(--pixfont);
  /* A touch smaller than the scorebug type so full 8-char names stay compact;
     everything is in --u so the row scales with the board (responsive). */
  font-size: calc(8 * var(--u));
  line-height: 1;
  /* Size to content so full names never truncate; rows are right-anchored
     (align-items:flex-end on #killfeed) so a long row grows leftward — bounded
     by the small font + the pre-bounded 10-char name, so it can't run away. */
  max-width: none;
  white-space: nowrap;
  animation: feedin 250ms cubic-bezier(.2,1.3,.5,1);
}
.feed-row.leaving { animation: feedout 260ms ease-in forwards; }
@keyframes feedin { from { transform: translateX(calc(30 * var(--u))); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes feedout { to { opacity: 0; transform: translateX(calc(14 * var(--u))); } }
.feed-row .who { white-space: nowrap; }  /* names are pre-bounded to 10 chars by shortName(); show in full, never ellipsize */
.feed-row .who.red { color: var(--red); }
.feed-row .who.blue { color: var(--blue); }
.feed-row .glyph { color: var(--paper); font-size: calc(9 * var(--u)); }
.feed-row .badge {
  font-family: var(--finefont);
  font-size: calc(7 * var(--u));
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: calc(1 * var(--u)) calc(4 * var(--u));
  color: var(--stage-lo);
  background: var(--amber);
}
.feed-row .badge.tk { background: var(--red); color: var(--paper); }
.feed-row .badge.carrier { background: var(--amber); }
.feed-row.flagkill { box-shadow: inset 0 calc(-2 * var(--u)) 0 var(--amber); }

/* Roster rails removed: per-player state now rides the scorebug squad strip
   (the roster IS the counter, genre convention) and the board's own name tags.
   No floating bordered rails over the arena flanks (in-world, no HUD chrome). */

/* POV eye badge shown when a slot is inspected (fog-honesty lens) */
#povBadge {
  position: absolute;
  top: calc(64 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  display: none;
  align-items: center;
  gap: calc(5 * var(--u));
  padding: calc(3 * var(--u)) calc(9 * var(--u));
  background: var(--ink-soft);
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  z-index: 12;
  cursor: pointer;
}
#povBadge.on { display: flex; }

/* ---------- 5. TRANSPORT ---------- */
#transport {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  gap: calc(5 * var(--u));
  padding: calc(10 * var(--u)) calc(12 * var(--u)) calc(9 * var(--u));
  background: linear-gradient(to top, rgba(11, 7, 4, 0.9) 0%, rgba(11, 7, 4, 0.42) 68%, transparent 100%);
}
#transport.disabled { opacity: 0.35; pointer-events: none; }

/* scrubber: click-to-seek track (top) over a full-timeline momentum graph.
   The seek track and the momentum graph share the SAME 0→maxTicks x-axis, so
   the playhead crosses the graph 1:1 with the timeline (no scrolling window). */
.scrub {
  position: relative;
  height: calc(34 * var(--u));
  cursor: pointer;
}
.scrub-track {
  position: absolute;
  left: 0; right: 0; top: calc(6 * var(--u));
  height: calc(4 * var(--u));
  background: rgba(242, 232, 216, 0.16);
}
.scrub-fill {
  position: absolute;
  left: 0; top: calc(6 * var(--u));
  height: calc(4 * var(--u));
  background: var(--paper);
  width: 0;
}
.scrub-head {
  /* spans track + graph so the playhead reads against the momentum curve */
  position: absolute;
  top: calc(2 * var(--u));
  width: calc(3 * var(--u));
  height: calc(30 * var(--u));
  background: var(--amber);
  transform: translateX(calc(-1.5 * var(--u)));
  left: 0;
  z-index: 3;
}
/* Full-timeline lives-lead graph, occupying the band UNDER the seek track. */
.momentum {
  position: absolute;
  left: 0; right: 0; top: calc(12 * var(--u));
  height: calc(22 * var(--u));
  display: block;
  overflow: visible;
}
.momentum-label {
  position: absolute;
  left: 0; top: calc(13 * var(--u));
  font-family: var(--finefont);
  font-size: calc(6 * var(--u));
  letter-spacing: 0.12em;
  color: var(--paper-dim);
  opacity: 0.5;
  pointer-events: none;
  z-index: 2;
}
.beat-marker {
  position: absolute;
  top: 0;
  width: calc(2 * var(--u));
  height: calc(10 * var(--u));
  transform: translateX(-1px);
  z-index: 2;
}
.beat-marker.kill { background: var(--paper-dim); }
.beat-marker.steal { background: var(--amber); }
.beat-marker.capture { background: var(--red); }

.tbar {
  display: flex;
  align-items: center;
  gap: calc(5 * var(--u));
  flex-wrap: wrap;
}
.tbtn {
  font-family: var(--pixfont);
  font-size: calc(11 * var(--u));
  color: var(--paper);
  background: rgba(242, 232, 216, 0.08);
  border: none;
  padding: calc(5 * var(--u)) calc(8 * var(--u));
  min-width: calc(26 * var(--u));
  cursor: pointer;
  line-height: 1;
}
.tbtn:hover { background: rgba(242, 232, 216, 0.2); }
.tbtn.on { color: var(--amber); box-shadow: inset 0 calc(-2 * var(--u)) 0 var(--amber); }
.tbtn svg { width: calc(12 * var(--u)); height: calc(12 * var(--u)); display: block; fill: currentColor; }
.tsep { flex: 1; }
.speedchips { display: flex; gap: calc(2 * var(--u)); }
.chip {
  font-family: var(--pixfont);
  font-size: calc(9 * var(--u));
  color: var(--paper-dim);
  background: rgba(242, 232, 216, 0.06);
  border: none;
  padding: calc(4 * var(--u)) calc(5 * var(--u));
  cursor: pointer;
  line-height: 1;
}
.chip.on { color: var(--stage-lo); background: var(--amber); }
.tick-clock {
  font-family: var(--pixfont);
  font-size: calc(9 * var(--u));
  color: var(--paper-dim);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* hash-mismatch warning (top center) — honest fidelity flag */
#mmwarn {
  position: absolute;
  top: calc(40 * var(--u));
  left: 50%;
  transform: translateX(-50%);
  display: none;
  padding: calc(3 * var(--u)) calc(9 * var(--u));
  background: var(--red);
  color: var(--paper);
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 20;
}
#mmwarn.on { display: block; }

/* ---------- 6. END-CARD ---------- */
#endcard {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: calc(12 * var(--u));
  background: radial-gradient(80% 70% at 50% 45%, rgba(16, 11, 7, 0.82), rgba(9, 6, 3, 0.95));
  z-index: 30;
  padding: calc(20 * var(--u));
  text-align: center;
}
#endcard.on { display: flex; animation: cardfade 420ms ease-out; }
@keyframes cardfade { from { opacity: 0; } to { opacity: 1; } }
#endcard .verdict-badge {
  font-family: var(--pixfont);
  font-size: calc(13 * var(--u));
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: calc(5 * var(--u)) calc(14 * var(--u));
  color: var(--stage-lo);
}
#endcard .verdict-badge.red { background: var(--red); color: var(--paper); }
#endcard .verdict-badge.blue { background: var(--blue); color: var(--paper); }
#endcard .verdict-badge.draw { background: var(--ghost); color: var(--stage-lo); }
#endcard .headline {
  font-family: var(--pixfont);
  font-size: calc(30 * var(--u));
  line-height: 1.05;
  color: var(--paper);
  text-shadow: 0 calc(3 * var(--u)) 0 var(--ink);
}
#endcard .how {
  font-family: var(--finefont);
  font-size: calc(11 * var(--u));
  letter-spacing: 0.05em;
  color: var(--paper-dim);
  max-width: calc(360 * var(--u));
}
#endcard .final-lives {
  display: flex;
  gap: calc(30 * var(--u));
  align-items: baseline;
  font-family: var(--pixfont);
}
#endcard .fl-team { display: flex; flex-direction: column; align-items: center; gap: calc(3 * var(--u)); }
#endcard .fl-num { font-size: calc(26 * var(--u)); }
#endcard .fl-num.red { color: var(--red); }
#endcard .fl-num.blue { color: var(--blue); }
#endcard .fl-cap {
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--paper-dim);
}

/* connection status — fine print, lower-left */
#status {
  position: absolute;
  left: calc(10 * var(--u));
  bottom: calc(62 * var(--u));
  font-family: var(--finefont);
  font-size: calc(8 * var(--u));
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ghost);
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 200ms;
}
#status.show { opacity: 1; }

/* ============================================================
   The replay is ONE fixed-aspect composition (relayout() sizes #stage to the
   board's 1235:659 aspect inside the embed box), so there is no portrait/reflow
   case: at every container shape the board and its overlays scale together as a
   single unit and stay pinned. The only responsive lever is chrome DENSITY —
   `.tiny` eases the reserves so the 640×360 floor stays legible.
   ============================================================ */
/* very small floor (≤620px stage): tighten reserves */
#stage.tiny #killfeed { min-height: calc(3 * 20 * var(--u)); width: calc(190 * var(--u)); }
#stage.tiny .plate .squad-pip { width: calc(6 * var(--u)); height: calc(6 * var(--u)); }
#stage.tiny .chase-bar { width: calc(96 * var(--u)); }

@media (prefers-reduced-motion: reduce) {
  #grain, .clock.amb { animation: none; }
  .plate.leader .lives-num { animation: none; }
  .banner-chip, .feed-row { animation-duration: 1ms; }
}
</style>
</head>
<body>
<div id="viewport">
<div id="stage">
  <canvas id="board"></canvas>
  <div id="lightpool"></div>
  <div id="grain" class="amb"></div>

  <div id="chrome">
    <div id="scorebug">
      <div class="plate red" data-team="red">
        <div class="flagicon" id="flag-red"></div>
        <div class="team-id">
          <div class="team-name" id="name-red">RED</div>
          <div class="lives-line">
            <span class="lives-num" id="lives-red">—</span>
            <span class="lives-label">Lives</span>
          </div>
          <!-- one pip per player (8): alive / down / eliminated. The roster IS
               the counter (Valorant/R6/Apex). Clickable → POV lens. -->
          <div class="squad" id="squad-red"></div>
        </div>
      </div>

      <div class="clock-col">
        <div class="clock amb" id="clock">
          <div class="time" id="clock-time">0:00</div>
          <div class="caption" id="clock-caption">Warming up</div>
        </div>
        <!-- capture-chase gauge: appears only while a flag is carried; fills
             toward the defended home as the carrier nears the cap (the flag
             run made watchable — the #1 CTF drama, prog/863px). -->
        <div class="chase" id="chase">
          <div class="chase-bar"><div class="chase-fill" id="chase-fill"></div></div>
          <div class="chase-label" id="chase-label"></div>
        </div>
      </div>

      <div class="plate blue" data-team="blue">
        <div class="flagicon" id="flag-blue"></div>
        <div class="team-id">
          <div class="team-name" id="name-blue">BLUE</div>
          <div class="lives-line">
            <span class="lives-num" id="lives-blue">—</span>
            <span class="lives-label">Lives</span>
          </div>
          <div class="squad" id="squad-blue"></div>
        </div>
      </div>
    </div>

    <div id="mmwarn">Replay hash mismatch — showing recorded inputs</div>
    <div id="povBadge">👁 POV lens — click to clear</div>
    <div id="bannerlane"></div>
    <div id="killfeed"></div>

    <div id="transport">
      <div class="scrub" id="scrub">
        <!-- momentum graph sits UNDERNEATH the seek track, on the SAME tick/mx
             axis, so the playhead crosses it 1:1 with the timeline -->
        <svg class="momentum" id="momentum" viewBox="0 0 1000 100"
             preserveAspectRatio="none" aria-hidden="true"></svg>
        <span class="momentum-label">LIVES LEAD</span>
        <div class="scrub-track"></div>
        <div class="scrub-fill" id="scrub-fill"></div>
        <div class="scrub-head" id="scrub-head"></div>
      </div>
      <div class="tbar">
        <button class="tbtn" id="btn-restart" title="Restart (,)">⟲</button>
        <button class="tbtn" id="btn-back" title="Back one tick (b)">◂|</button>
        <button class="tbtn" id="btn-play" title="Play / pause (space)">▶</button>
        <button class="tbtn" id="btn-fwd" title="Skip +5s (.)">+5s</button>
        <button class="tbtn" id="btn-end" title="Jump to end (e)">|▸</button>
        <button class="tbtn" id="btn-loop" title="Loop (r)">↻</button>
        <span class="tick-clock" id="tick-clock">0 / 0</span>
        <span class="tsep"></span>
        <div class="speedchips" id="speedchips"></div>
      </div>
    </div>

    <div id="endcard">
      <div class="verdict-badge" id="ec-badge">GAME OVER</div>
      <div class="headline" id="ec-headline">—</div>
      <div class="how" id="ec-how"></div>
      <div class="final-lives">
        <div class="fl-team">
          <div class="fl-num red" id="ec-red">0</div>
          <div class="fl-cap">Red lives</div>
        </div>
        <div class="fl-team">
          <div class="fl-num blue" id="ec-blue">0</div>
          <div class="fl-cap">Blue lives</div>
        </div>
      </div>
    </div>
  </div>

  <div id="status">connecting</div>
</div>
</div>

<script>

      up[7] = 0x01;
      up[8] = 0;
      sendPacket(up);
    }

    function getTransform() {
      return {
        scale,
        offsetX,
        offsetY,
        nativeW,
        nativeH
      };
    }

    function setViewportFit() {
      updateNativeSize();
      computeFit();
      scheduleDraw();
    }

    function setVerticalBias(bias) {
      verticalBias = bias;
      computeFit();
      scheduleDraw();
    }

    function start() {
      updateNativeSize();
      computeFit();
      connect();
      scheduleDraw();
    }

    function stop() {
      stopped = true;
      if (socket) {
        socket.close();
        socket = null;
      }
      if (rafHandle) {
        cancelAnimationFrame(rafHandle);
        rafHandle = null;
      }
    }

    return {
      start,
      sendCommand,
      clickMap,
      getTransform,
      setViewportFit,
      setVerticalBias,
      stop
    };
  }

  window.BroadcastCore = { create: BroadcastCore };
})();

</script>

<script>
(function () {
  'use strict';

  // ---- palette (mirrors board tints so chrome matches the arena) ----
  var RED = '#e0523a', BLUE = '#3f7cc4', AMBER = '#e8a33d', PAPER = '#f2e8d8';
  var SPEEDS = [1, 2, 3, 4, 8, 16];
  var FPS = 24;

  // Two independent tempo levers (§11, L20):
  //  (1) ANIM_MAX_FACTOR — chrome beat animations never play faster than this
  //      no matter the replay speed, so feed rows / flips / banners keep their
  //      read time at 8-16×. Applied as an animationFactor cap on durations.
  //  (2) DWELL_FLOOR_MS — a beat's on-screen hold has a wall-clock minimum
  //      (feed row / banner / curtain), collapsing only the dead time between
  //      contacts. These are NOT one speed knob — one caps motion, one floors dwell.
  var ANIM_MAX_FACTOR = 2;
  var DWELL_FLOOR_MS = { feed: 2600, banner: 1900, curtain: 2400, read: 600 };
  function animFactor() {
    // Lever 1 — the chrome plays at min(replaySpeed, cap): at 16× the board flies
    // but a kill row still slides in at 2×-equivalent so a human can read it.
    var sp = (lastState && lastState.sp) || 1;
    return Math.min(sp, ANIM_MAX_FACTOR);
  }
  function dwellFloor(kind) {
    // Lever 2 — a beat's on-screen hold has a wall-clock minimum regardless of
    // replay speed; speed collapses only the dead time between contacts, never
    // the read time of a beat itself. Independent of the animFactor cap.
    return DWELL_FLOOR_MS[kind] || DWELL_FLOOR_MS.read;
  }
  // Beat-pause (§11): freeze chrome ambient the instant a beat lands so idle
  // life never competes with a kill/steal/capture. Held for the READ_PAUSE floor
  // (≥600ms wall-clock), then released. The board's own 24Hz is never touched.
  var beatPulseTimer = null;
  function beatPulse() {
    stage.classList.add('beat-active');
    if (beatPulseTimer) clearTimeout(beatPulseTimer);
    beatPulseTimer = setTimeout(function () {
      stage.classList.remove('beat-active');
      beatPulseTimer = null;
    }, dwellFloor('read'));
  }

  var $ = function (id) { return document.getElementById(id); };
  var viewport = $('viewport');
  var stage = $('stage');
  var canvas = $('board');
  var statusEl = $('status');

  // The whole replay is ONE fixed-aspect composition locked to the board's
  // native size (sim.nim MapWidth×MapHeight = 1235×659). The stage is sized to
  // this aspect inside the embed box and every overlay scales with it, so the
  // chrome can never drift off the graphics regardless of the Observatory
  // container's shape (§2 real-container-target, L82 bounded-embed).
  var BOARD_W = 1235, BOARD_H = 659;
  var BOARD_ASPECT = BOARD_W / BOARD_H;

  // ---- flag icon svg (HOME/TAKEN are the only two states — F2) ----
  function buildFlag(el, color) {
    el.innerHTML =
      '<svg viewBox="0 0 26 30" aria-hidden="true">' +
      '<rect x="4" y="2" width="2" height="26" fill="#2a1f16"/>' +
      '<g class="cloth"><path d="M6 3 L22 3 L18 9 L22 15 L6 15 Z" fill="' + color + '"/></g>' +
      '<rect x="1" y="26" width="10" height="3" fill="#8a7f72"/>' +
      '</svg>' +
      '<div class="carrier-tag"></div>';
  }
  buildFlag($('flag-red'), RED);
  buildFlag($('flag-blue'), BLUE);

  // ---- speed chips ----
  var speedChipsEl = $('speedchips');
  var speedChipEls = {};
  SPEEDS.forEach(function (s) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.textContent = s + '×';
    b.setAttribute('aria-label', s + 'x speed');
    b.addEventListener('click', function () { setSpeed(s); });
    speedChipsEl.appendChild(b);
    speedChipEls[s] = b;
  });

  // ---- core (board renderer + WS) ----
  var lastState = null;
  var core = window.BroadcastCore.create({
    canvas: canvas,
    onText: function (txt) { onFrame(txt); },
    onStatus: function (st) { onStatus(st); },
    onFirstFrame: function () { core.setViewportFit(); }
  });

  function send(cmd) { core.sendCommand(cmd); }

  function onStatus(st) {
    statusEl.textContent = st;
    statusEl.classList.toggle('show', st !== 'open');
    if (st === 'open') {
      // Opt in to the JSON chrome channel (REPLAY-ONLY; legacy client never sends this).
      send('hud:on');
    }
  }

  // ============================================================
  //  Frame ingest
  // ============================================================
  var lastTick = -1;
  var seenMarkers = {}; // tick|kind -> true, for scrubber beat markers
  var momentumSamples = []; // {t, diff}

  function onFrame(txt) {
    var s;
    try { s = JSON.parse(txt); } catch (e) { return; }
    lastState = s;

    // Detect a jump (seek/loop): clear transient beats so nothing phantoms.
    var jumped = (s.t < lastTick) || (lastTick >= 0 && s.t - lastTick > (s.sp || 1) * 4 + 2);
    if (jumped) { clearFeed(); clearBanners(); }

    renderScorebug(s);
    renderClock(s);
    renderTransport(s);
    renderPov(s);
    renderMismatch(s);

    if (s.events && s.events.length && !jumped) {
      for (var i = 0; i < s.events.length; i++) applyEvent(s.events[i], s);
    }
    // Even on a jump, register beat markers we can place from state? Markers
    // come from events only; on a jump the tracker resync'd (no events), so we
    // keep whatever markers we already collected.
    recordMomentum(s);

    if (s.ph === 'gameover') { renderEndcard(s); }
    else { $('endcard').classList.remove('on'); }

    lastTick = s.t;
  }

  // ---------- scorebug ----------
  // Full pedestal-to-pedestal span (px) a carried flag crosses to score; the
  // capture-chase gauge normalizes teamFlagProgress against it. Engine-derived
  // (sim.nim teamHomeX: Red 186, Blue 1049 on the 1235-wide arena).
  var CHASE_SPAN = 863;

  // One pip per PLAYER (8), keyed by stable join slot: lit = alive, dim = down
  // but has lives left, hollow = eliminated. The strip is the "who's left"
  // read (the roster IS the counter); the numeral is the exact lives count.
  // Each pip is clickable → POV lens. NEVER shows kills (F1: kills ≠ score).
  function renderSquad(el, players, pov) {
    var key = players.map(function (p) { return p.s; }).join(',');
    if (el._key !== key) {
      el.innerHTML = ''; el._pips = {};
      players.forEach(function (p) {
        var pip = document.createElement('span');
        pip.className = 'squad-pip';
        pip.title = shortName(p.name);
        pip.addEventListener('click', function () { togglePov(p.s); });
        el.appendChild(pip);
        el._pips[p.s] = pip;
      });
      el._key = key;
    }
    players.forEach(function (p) {
      var pip = el._pips[p.s];
      if (!pip) return;
      var eliminated = !p.alive && p.lives <= 0;
      pip.classList.toggle('down', !p.alive && p.lives > 0);
      pip.classList.toggle('out', eliminated);
      pip.classList.toggle('carry', !!p.carry);
      pip.classList.toggle('pov', pov === p.s);
    });
  }

  function renderScorebug(s) {
    var tr = s.teams || {};
    var red = tr.red || {}, blue = tr.blue || {};
    var rl = red.lives || 0, bl = blue.lives || 0;

    setName('name-red', teamName(s, 'red', 'RED'));
    setName('name-blue', teamName(s, 'blue', 'BLUE'));

    $('lives-red').textContent = rl;
    $('lives-blue').textContent = bl;

    // squad pips per team (one per player), sorted by stable join slot
    var reds = [], blues = [];
    (s.roster || []).forEach(function (p) { (p.team === 'red' ? reds : blues).push(p); });
    reds.sort(function (a, b) { return a.s - b.s; });
    blues.sort(function (a, b) { return a.s - b.s; });
    renderSquad($('squad-red'), reds, s.pov);
    renderSquad($('squad-blue'), blues, s.pov);

    updateFlag('flag-red', 'red', red, s);
    updateFlag('flag-blue', 'blue', blue, s);
    renderChase(s, red, blue);

    // leader pulse when lead >= 3
    var rp = document.querySelector('.plate.red');
    var bp = document.querySelector('.plate.blue');
    rp.classList.toggle('leader', rl - bl >= 3 && s.ph === 'playing');
    bp.classList.toggle('leader', bl - rl >= 3 && s.ph === 'playing');
  }

  // Capture-chase gauge: the flag run made watchable. Within the `red` state
  // object, `carrier` carries the RED flag (a Blue attacker) and `prog` is how
  // far that red flag has advanced toward Blue's home — so each flag's run
  // pairs its OWN carrier + prog, and the attacker is the enemy of the flag's
  // team. Visible while the flag is TAKEN (carrier ≥ 0), so the gauge appears
  // at the instant of the steal; the reserved slot means no jump (L84).
  function renderChase(s, red, blue) {
    var chase = $('chase');
    var runs = [];
    if (red.flag === 'taken' && red.carrier >= 0)
      runs.push({ prog: red.prog || 0, carrier: red.carrier, attacker: 'blue' });
    if (blue.flag === 'taken' && blue.carrier >= 0)
      runs.push({ prog: blue.prog || 0, carrier: blue.carrier, attacker: 'red' });
    if (!runs.length || s.ph !== 'playing') {
      chase.classList.remove('on', 'near', 'red', 'blue');
      return;
    }
    // If both flags are out, feature the run nearer to scoring.
    var run = runs.sort(function (a, b) { return b.prog - a.prog; })[0];
    var frac = Math.max(0, Math.min(1, run.prog / CHASE_SPAN));
    chase.classList.add('on');
    chase.classList.toggle('red', run.attacker === 'red');
    chase.classList.toggle('blue', run.attacker === 'blue');
    chase.classList.toggle('near', frac >= 0.72);
    $('chase-fill').style.width = (frac * 100) + '%';
    var who = shortName(rosterName(s, run.carrier));
    $('chase-label').textContent = who + (frac >= 0.72 ? ' — CLOSING!' : ' carrying');
  }

  function teamName(s, team, fallback) {
    if (!s.roster) return fallback;
    for (var i = 0; i < s.roster.length; i++) {
      if (s.roster[i].team === team) {
        return (fallback === 'RED' ? 'RED' : 'BLUE'); // team label, not player name
      }
    }
    return fallback;
  }
  function setName(id, txt) { var el = $(id); if (el.textContent !== txt) el.textContent = txt; }

  function updateFlag(id, team, tstate, s) {
    var el = $(id);
    var taken = tstate.flag === 'taken';
    var was = el.classList.contains('taken');
    el.classList.toggle('taken', taken);
    if (was !== taken) { el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); }
    var tag = el.querySelector('.carrier-tag');
    if (tag) {
      if (taken && tstate.carrier >= 0) {
        tag.textContent = shortName(rosterName(s, tstate.carrier));
      } else { tag.textContent = ''; }
    }
  }

  function rosterName(s, slot) {
    if (!s.roster) return '#' + slot;
    for (var i = 0; i < s.roster.length; i++) {
      if (s.roster[i].s === slot) return s.roster[i].name || ('#' + slot);
    }
    return '#' + slot;
  }
  function shortName(n) {
    n = String(n || '');
    // Names are player addresses; keep them short + readable.
    var at = n.indexOf('@'); if (at > 0) n = n.slice(0, at);
    if (n.length > 10) n = n.slice(0, 10);
    return n || '?';
  }

  // ---------- clock ----------
  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60), r = sec % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }
  function renderClock(s) {
    var timeEl = $('clock-time'), capEl = $('clock-caption'), clk = $('clock');
    if (s.ph === 'lobby') {
      timeEl.textContent = s.lob > 0 ? (':' + (s.lob < 10 ? '0' : '') + s.lob) : '--';
      capEl.textContent = s.lob > 0 ? 'Starting in' : 'Waiting for players';
      clk.classList.remove('tiebreak-warn');
    } else if (s.ph === 'gameover') {
      timeEl.textContent = 'FINAL';
      capEl.textContent = 'Game over';
      clk.classList.remove('tiebreak-warn');
    } else {
      // Time to the REAL tiebreak limit (config.maxTicks) — an honest label (F3).
      var remain = Math.max(0, (s.mt - s.t)) / FPS;
      timeEl.textContent = fmt(remain);
      capEl.textContent = 'Tiebreak in';
      clk.classList.toggle('tiebreak-warn', remain <= 30);
    }
  }

  // ---------- transport ----------
  function renderTransport(s) {
    $('transport').classList.toggle('disabled', !s.en);
    var playBtn = $('btn-play');
    playBtn.textContent = s.pl ? '❘❘' : '▶';
    $('btn-loop').classList.toggle('on', !!s.lp);

    // speed chips
    SPEEDS.forEach(function (sp) { speedChipEls[sp].classList.toggle('on', sp === s.sp); });

    // scrubber
    var mx = Math.max(1, s.mx || 1);
    var frac = Math.min(1, Math.max(0, s.t / mx));
    $('scrub-fill').style.width = (frac * 100) + '%';
    $('scrub-head').style.left = (frac * 100) + '%';
    $('tick-clock').textContent = s.t + ' / ' + mx;

    renderBeatMarkers(mx);
    renderMomentum();
  }

  // ---------- pov + mismatch ----------
  function renderPov(s) {
    var badge = $('povBadge');
    badge.classList.toggle('on', s.pov >= 0);
    if (s.pov >= 0) badge.textContent = '👁 POV: ' + shortName(rosterName(s, s.pov)) + ' — click to clear';
  }
  function renderMismatch(s) {
    $('mmwarn').classList.toggle('on', s.mm >= 0);
  }

  // ============================================================
  //  Beats → surfaces  (§5)
  // ============================================================
  function applyEvent(e, s) {
    switch (e.k) {
      case 'kill': onKill(e, s); markBeat(e.t, 'kill'); beatPulse(); break;
      case 'steal': onSteal(e, s); markBeat(e.t, 'steal'); beatPulse(); break;
      case 'return': onReturn(e, s); beatPulse(); break;
      case 'capture': onCapture(e, s); markBeat(e.t, 'capture'); beatPulse(); break;
      case 'respawn': /* board rematerialize handles this visually */ break;
      case 'gameover': /* end-card is state-driven */ break;
      case 'phase': /* clock caption handles phase */ break;
    }
  }

  function onKill(e, s) {
    var killer = e.killer, victim = e.victim;
    var victimTeam = teamOf(s, victim);
    var killerTeam = killer >= 0 ? teamOf(s, killer) : null;
    var row = document.createElement('div');
    row.className = 'feed-row';
    var glyph = '▸';
    var badge = '';
    if (e.amb) {
      // Genuine same-tick multi-kill: attribution honestly ambiguous (F7).
      badge = '<span class="badge">traded</span>';
      row.innerHTML = '<span class="who ' + (killerTeam || '') + '">' + '—' + '</span>' +
        '<span class="glyph">' + glyph + '</span>' +
        '<span class="who ' + (victimTeam || '') + '">' + esc(shortName(rosterName(s, victim))) + '</span>' + badge;
    } else {
      if (e.tk) { badge = '<span class="badge tk">team kill</span>'; row.classList.add('flagkill'); }
      var killerName = killer >= 0 ? shortName(rosterName(s, killer)) : 'the arena';
      row.innerHTML = '<span class="who ' + (killerTeam || '') + '">' + esc(killerName) + '</span>' +
        '<span class="glyph">' + glyph + '</span>' +
        '<span class="who ' + (victimTeam || '') + '">' + esc(shortName(rosterName(s, victim))) + '</span>' + badge;
    }
    pushFeed(row);
  }

  function onSteal(e, s) {
    var flagTeam = e.flag; // the team whose flag was TAKEN
    var thief = shortName(rosterName(s, e.by));
    banner((flagTeam === 'red' ? 'RED' : 'BLUE') + ' FLAG TAKEN', 'steal ' + (flagTeam + '-accent'));
  }
  function onReturn(e, s) {
    var flagTeam = e.flag;
    banner((flagTeam === 'red' ? 'RED' : 'BLUE') + ' FLAG RETURNED', 'returned ' + (flagTeam + '-accent'));
  }
  function onCapture(e, s) {
    var byTeam = teamOf(s, e.by);
    banner((byTeam === 'red' ? 'RED' : 'BLUE') + ' CAPTURES', 'wipe ' + (byTeam + '-accent'));
  }

  function teamOf(s, slot) {
    if (slot < 0 || !s.roster) return null;
    for (var i = 0; i < s.roster.length; i++) if (s.roster[i].s === slot) return s.roster[i].team;
    return null;
  }
  function esc(t) { return String(t).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }

  // ---------- kill feed queue (fixed reserve, dwell floor) ----------
  var feedEl = $('killfeed');
  var MAX_FEED = 4;
  function pushFeed(row) {
    feedEl.insertBefore(row, feedEl.firstChild);
    while (feedEl.children.length > MAX_FEED) feedEl.removeChild(feedEl.lastChild);
    // Dwell floor (lever 2): a wall-clock minimum so the row reads even at 16×.
    var hold = dwellFloor('feed');
    // animFactor cap (lever 1): the slide-in duration never dips below its
    // read-time, so the row still overshoots-and-settles legibly at high speed.
    row.style.animationDuration = (250 / animFactor()) + 'ms';
    setTimeout(function () {
      if (row.parentNode) { row.classList.add('leaving'); setTimeout(function () { if (row.parentNode) row.parentNode.removeChild(row); }, 300); }
    }, hold);
  }
  function clearFeed() { feedEl.innerHTML = ''; }

  // ---------- banner lane queue (one at a time, min hold) ----------
  var bannerEl = $('bannerlane');
  var bannerQueue = [];
  var bannerBusy = false;
  function banner(text, cls) {
    bannerQueue.push({ text: text, cls: cls });
    pumpBanner();
  }
  function pumpBanner() {
    if (bannerBusy || !bannerQueue.length) return;
    bannerBusy = true;
    var b = bannerQueue.shift();
    var chip = document.createElement('div');
    chip.className = 'banner-chip ' + b.cls;
    chip.textContent = b.text;
    bannerEl.appendChild(chip);
    // lever 1 (animFactor cap): the pop-in never plays faster than 2x, so a
    // fast-forward scrub can't reduce a banner to a subliminal flash.
    chip.style.animationDuration = (300 / animFactor()) + 'ms';
    var hold = dwellFloor('banner'); // lever 2: wall-clock dwell floor (~1.9s)
    setTimeout(function () {
      chip.classList.add('leaving');
      setTimeout(function () {
        if (chip.parentNode) chip.parentNode.removeChild(chip);
        bannerBusy = false;
        pumpBanner();
      }, 260);
    }, hold);
  }
  function clearBanners() {
    bannerQueue = [];
    bannerEl.innerHTML = '';
    bannerBusy = false;
  }

  // ---------- scrubber beat markers ----------
  var scrubEl = $('scrub');
  function markBeat(tick, kind) {
    var mk = tick + '|' + kind;
    if (seenMarkers[mk]) return;
    seenMarkers[mk] = { tick: tick, kind: kind };
    pendingMarkers.push({ tick: tick, kind: kind });
  }
  var pendingMarkers = [];
  function renderBeatMarkers(mx) {
    if (!pendingMarkers.length) return;
    pendingMarkers.forEach(function (m) {
      var el = document.createElement('div');
      el.className = 'beat-marker ' + m.kind;
      el.style.left = (Math.min(1, m.tick / mx) * 100) + '%';
      scrubEl.appendChild(el);
    });
    pendingMarkers = [];
  }

  // ---------- momentum graph (lives-lead over the WHOLE timeline) ----------
  // A step line + difference shading on the SAME 0→maxTicks x-axis as the seek
  // track, so a point's x IS its tick. Positive = Red leads (red shading above
  // the even-lives midline), negative = Blue leads (blue below). Samples are
  // keyed by tick (dedup) and accumulate for the whole replay — NOT a scrolling
  // window — so the curve stays put while only the playhead moves across it.
  var VBW = 1000, VBH = 100, MID = 50; // SVG viewBox (preserveAspectRatio:none)
  var MOM_SVGNS = 'http://www.w3.org/2000/svg';
  var momentumSeen = {};            // tick -> true (dedup)
  var momentumDirty = true;         // rebuild the path only when a new tick lands
  function recordMomentum(s) {
    if (s.ph !== 'playing' && s.ph !== 'gameover') return;
    if (momentumSeen[s.t]) return;  // deterministic replay: a tick's diff is fixed
    momentumSeen[s.t] = true;
    var tr = s.teams || {};
    var diff = ((tr.red && tr.red.lives) || 0) - ((tr.blue && tr.blue.lives) || 0);
    momentumSamples.push({ t: s.t, diff: diff });
    momentumDirty = true;
  }
  function renderMomentum() {
    var el = $('momentum');
    if (!lastState || !momentumSamples.length) { if (!momentumSamples.length) el.innerHTML = ''; return; }
    if (!momentumDirty && el.childNodes.length) return; // nothing new to draw
    momentumDirty = false;
    var mx = Math.max(1, lastState.mx || 1);

    // Full vertical scale = 8 players × config lives (±24). A fixed scale keeps
    // the curve's height meaningful and stable (no rescale as the game plays).
    var maxAbs = 24;
    momentumSamples.forEach(function (m) { maxAbs = Math.max(maxAbs, Math.abs(m.diff)); });

    // Sort by tick and build a STEP series across the full [0, mx] axis.
    var pts = momentumSamples.slice().sort(function (a, b) { return a.t - b.t; });
    function xOf(t) { return Math.min(1, Math.max(0, t / mx)) * VBW; }
    function yOf(d) { return MID - (d / maxAbs) * (MID - 2); } // clamp off the edges
    var line = '', k;
    for (k = 0; k < pts.length; k++) {
      var x = xOf(pts[k].t), y = yOf(pts[k].diff);
      if (k === 0) line += 'M ' + x.toFixed(1) + ' ' + y.toFixed(1);
      else line += ' H ' + x.toFixed(1) + ' V ' + y.toFixed(1); // step: hold then step
    }
    // Shaded area drops from the line to the midline and closes back.
    var lastX = xOf(pts[pts.length - 1].t);
    var area = line + ' L ' + lastX.toFixed(1) + ' ' + MID + ' L ' + xOf(pts[0].t).toFixed(1) + ' ' + MID + ' Z';

    el.setAttribute('viewBox', '0 0 ' + VBW + ' ' + VBH);
    el.innerHTML = '';
    var defs = document.createElementNS(MOM_SVGNS, 'defs');
    // Split fill: red above the midline, blue below — one gradient, hard stop.
    // userSpaceOnUse so the hard 50/50 split lands exactly on the midline
    // (y=MID) — red fills the region above it, blue below, wherever the curve is.
    defs.innerHTML =
      '<linearGradient id="momfill" gradientUnits="userSpaceOnUse" ' +
        'x1="0" y1="0" x2="0" y2="' + VBH + '">' +
      '<stop offset="0%" stop-color="' + RED + '" stop-opacity="0.8"/>' +
      '<stop offset="50%" stop-color="' + RED + '" stop-opacity="0.28"/>' +
      '<stop offset="50%" stop-color="' + BLUE + '" stop-opacity="0.28"/>' +
      '<stop offset="100%" stop-color="' + BLUE + '" stop-opacity="0.8"/>' +
      '</linearGradient>';
    el.appendChild(defs);
    // dark backing so the shading reads against a consistent ground, not the
    // flagstone floor showing through the transport gradient.
    var bg = document.createElementNS(MOM_SVGNS, 'rect');
    bg.setAttribute('x', 0); bg.setAttribute('y', 0);
    bg.setAttribute('width', VBW); bg.setAttribute('height', VBH);
    bg.setAttribute('fill', 'rgba(11,7,4,0.55)');
    el.appendChild(bg);
    // even-lives midline
    var mid = document.createElementNS(MOM_SVGNS, 'line');
    mid.setAttribute('x1', 0); mid.setAttribute('y1', MID);
    mid.setAttribute('x2', VBW); mid.setAttribute('y2', MID);
    mid.setAttribute('stroke', 'rgba(242,232,216,0.22)');
    mid.setAttribute('stroke-width', '0.8');
    el.appendChild(mid);
    var areaEl = document.createElementNS(MOM_SVGNS, 'path');
    areaEl.setAttribute('d', area);
    areaEl.setAttribute('fill', 'url(#momfill)');
    areaEl.setAttribute('stroke', 'none');
    el.appendChild(areaEl);
    var lineEl = document.createElementNS(MOM_SVGNS, 'path');
    lineEl.setAttribute('d', line);
    lineEl.setAttribute('fill', 'none');
    lineEl.setAttribute('stroke', PAPER);
    lineEl.setAttribute('stroke-width', '1.5');
    lineEl.setAttribute('stroke-opacity', '0.95');
    lineEl.setAttribute('vector-effect', 'non-scaling-stroke');
    el.appendChild(lineEl);
  }

  // ============================================================
  //  End-card (§5/§8) — reads isDraw BEFORE winner (F4); names the key (F3)
  // ============================================================
  function renderEndcard(s) {
    var card = $('endcard');
    if (!s.over) return;
    card.classList.add('on'); // own the frame at GameOver (§8) — before either verdict branch
    var o = s.over;
    var badge = $('ec-badge'), head = $('ec-headline'), how = $('ec-how');
    var redL = o.redLives, blueL = o.blueLives;
    $('ec-red').textContent = redL;
    $('ec-blue').textContent = blueL;

    if (o.draw) {
      badge.className = 'verdict-badge draw';
      badge.textContent = 'DRAW';
      head.textContent = 'DEAD EVEN';
      how.textContent = o.timeLimit
        ? 'Time expired with the teams level on lives and flag progress — a true draw.'
        : 'The match ended level — no winner.';
      return;
    }

    var winner = o.winner; // 'red' | 'blue'
    var winName = winner === 'red' ? 'RED' : 'BLUE';
    badge.className = 'verdict-badge ' + winner;
    badge.textContent = winName + ' WINS';
    head.textContent = winName + ' WINS';

    if (o.timeLimit) {
      // Tiebreak — name the key and the values (F3).
      var winL = winner === 'red' ? redL : blueL;
      var loseL = winner === 'red' ? blueL : redL;
      if (winL !== loseL) {
        how.textContent = 'Time expired — ' + winName + ' held more lives (' + winL + ' vs ' + loseL + ').';
      } else {
        how.textContent = 'Time expired — lives tied; ' + winName + ' won on flag progress.';
      }
    } else {
      var loserLives = winner === 'red' ? blueL : redL;
      if (loserLives <= 0) {
        head.textContent = winName + ' WIPES OUT ' + (winner === 'red' ? 'BLUE' : 'RED');
        how.textContent = winName + ' eliminated every opposing life.';
      } else {
        how.textContent = winName + ' captured the enemy flag.';
      }
    }
  }

  // ============================================================
  //  Transport wiring — DOM controls emit the legacy chat chars +
  //  the ctf-side s:/v: whole-string commands.
  // ============================================================
  function togglePlay() { send(' '); }
  function setSpeed(s) {
    var map = { 1: '1', 2: '2', 3: '3', 4: '4', 8: '8', 16: '6' };
    if (map[s]) send(map[s]);
  }
  $('btn-play').addEventListener('click', togglePlay);
  $('btn-restart').addEventListener('click', function () { send(','); });
  $('btn-back').addEventListener('click', function () { send('b'); });
  $('btn-fwd').addEventListener('click', function () { send('.'); });
  $('btn-end').addEventListener('click', function () { send('e'); });
  $('btn-loop').addEventListener('click', function () { send('r'); });

  // click-to-seek: map x-fraction to a tick and send s:<tick>
  $('scrub').addEventListener('click', function (ev) {
    if (!lastState || !lastState.en) return;
    var rect = this.getBoundingClientRect();
    var frac = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
    var tick = Math.round(frac * Math.max(1, lastState.mx || 1));
    send('s:' + tick);
  });

  // pov clear
  $('povBadge').addEventListener('click', function () { send('v:-1'); });
  function togglePov(slot) {
    if (lastState && lastState.pov === slot) send('v:-1');
    else send('v:' + slot);
  }

  // keyboard shortcuts mirror the transport
  window.addEventListener('keydown', function (ev) {
    if (ev.metaKey || ev.ctrlKey || ev.altKey) return;
    var k = ev.key;
    if (k === ' ') { ev.preventDefault(); togglePlay(); }
    else if (k === ',' || k === '<') send(',');
    else if (k === '.' || k === '>') send('.');
    else if (k === 'b') send('b');
    else if (k === 'e') send('e');
    else if (k === 'r') send('r');
    else if (k === '+' || k === '=') send('+');
    else if (k === '-' || k === '_') send('-');
    else if (k >= '1' && k <= '9') send(k);
  });

  // ============================================================
  //  Fixed-aspect fit: size the composition to the board's native aspect
  //  inside the embed box, then scale the whole thing (board + overlays) as
  //  one unit. Chrome sizes off the STAGE width, so overlays stay locked to
  //  the graphics at any container shape (§2, L82 bounded-embed).
  // ============================================================
  function relayout() {
    var boxW = viewport.clientWidth, boxH = viewport.clientHeight;
    if (!boxW || !boxH) return;
    // Fit the board aspect into the box (contain): the larger dimension is
    // capped by whichever axis binds first, and the warm #120d09 letterbox
    // fills the remainder (never pure #000).
    var stageW, stageH;
    if (boxW / boxH > BOARD_ASPECT) {
      stageH = boxH; stageW = Math.round(boxH * BOARD_ASPECT);
    } else {
      stageW = boxW; stageH = Math.round(boxW / BOARD_ASPECT);
    }
    stage.style.width = stageW + 'px';
    stage.style.height = stageH + 'px';
    // One scale for the whole composition: chrome was authored against a
    // ~760px-wide reference board, so --hudscale is simply the stage's on-screen
    // width over that reference (clamped so a huge featured embed doesn't bloat
    // the chrome and a tiny 360px floor stays legible). Everything — board and
    // every overlay — now shares this single scale, pinned in stage-space.
    var scale = Math.max(0.5, Math.min(1.6, stageW / 760));
    document.documentElement.style.setProperty('--hudscale', scale.toFixed(3));
    // A narrow embed still holds the same composition; only the chrome density
    // eases (kept as a hook for the 640×360 floor, no reflow of the layout).
    stage.classList.toggle('tiny', stageW <= 620);
    core.setViewportFit();
  }
  var ro = new ResizeObserver(relayout);
  ro.observe(viewport);
  window.addEventListener('resize', relayout);

  relayout();
  core.start();
})();
</script>
</body>
</html>
