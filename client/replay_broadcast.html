          }
          changed = true;
        } else if (type === 0x02) {
          const id = readU16(bytes, offset);
          const x = readI16(bytes, offset + 2);
          const y = readI16(bytes, offset + 4);
          const z = readI16(bytes, offset + 6);
          const layer = bytes[offset + 8];
          const spriteId = readU16(bytes, offset + 9);
          objects.set(id, { id, x, y, z, layer, spriteId });
          offset += 11;
          changed = true;
        } else if (type === 0x03) {
          objects.delete(readU16(bytes, offset));
          offset += 2;
          changed = true;
        } else if (type === 0x04) {
          objects.clear();
          changed = true;
        } else if (type === 0x05) {
          setViewport(layers, bytes[offset], readU16(bytes, offset + 1), readU16(bytes, offset + 3), () => {
            updateNativeSize();
            computeFit();
          });
          offset += 5;
          changed = true;
        } else if (type === 0x06) {
          defineLayer(layers, bytes[offset], bytes[offset + 1], bytes[offset + 2]);
          offset += 3;
        } else if (type === 0x07) {
          offset += 2;
        } else {
          console.warn('Unknown sprite protocol message type:', type);
          if (socket) socket.close();
          break;
        }
      }
      if (changed) {
        dirty = true;
        scheduleDraw();
        if (!firstFrameFired && objects.size > 0) {
          firstFrameFired = true;
          onFirstFrame();
        }
      }
    }

    function pacePresentOne() {
      // Pop entries up to and including the next binary frame; text messages
      // ride along in arrival order without consuming a cadence slot.
      while (paceQueue.length) {
        const entry = paceQueue.shift();
        if (entry.text !== undefined) {
          onText(entry.text);
          continue;
        }
        paceBinaryCount--;
        parse(entry.bytes);
        pacePresented++;
        if (onFrame) onFrame();
        return true;
      }
      return false;
    }

    function paceFastForward(keepDepth) {
      while (paceBinaryCount > keepDepth) pacePresentOne();
    }

    function paceReset() {
      // Drain anything still pending (in order — they're valid deltas), then
      // start priming from scratch. Used on (re)connect.
      paceFastForward(0);
      while (paceQueue.length) {
        const entry = paceQueue.shift();
        if (entry.text !== undefined) onText(entry.text);
      }
      paceArrivals = [];
      paceFirstArrival = 0;
      pacePrimed = false;
    }

    function paceSchedule() {
      // rAF gives paint-aligned pacing when the page is visible, but it
      // throttles or fully stops in hidden/occluded tabs — the timer backstop
      // keeps presentation and backlog control running there. Whichever fires
      // first cancels the other.
      if (!paceRaf) paceRaf = requestAnimationFrame(pacePumpRaf);
      if (!paceTimer) {
        paceTimer = setTimeout(pacePumpTimer, Math.max(25, paceInterval * 1.5));
      }
    }

    function pacePumpRaf(now) {
      paceRaf = null;
      if (paceTimer) {
        clearTimeout(paceTimer);
        paceTimer = null;
      }
      pacePump(now);
    }

    function pacePumpTimer() {
      paceTimer = null;
      if (paceRaf) {
        cancelAnimationFrame(paceRaf);
        paceRaf = null;
      }
      pacePump(performance.now());
    }

    function pacePump(now) {
      if (stopped) return;
      if (paceBinaryCount > PACE_MAX_DEPTH) {
        // Fell behind the live stream (delivery burst or stalled tab): apply
        // the backlog immediately so latency stays bounded at the cushion.
        paceFastForward(PACE_TARGET_DEPTH);
        pacePrimed = true;
        paceNextDue = now;
      }
      if (!pacePrimed &&
          (paceBinaryCount > PACE_TARGET_DEPTH ||
            (paceFirstArrival && now - paceFirstArrival >= PACE_PRIME_TIMEOUT))) {
        pacePrimed = true;
        paceNextDue = now;
      }
      // Text messages at the head arrived before every queued binary frame and
      // their preceding frame is already presented — deliver them now.
      while (paceQueue.length && paceQueue[0].text !== undefined) {
        onText(paceQueue.shift().text);
      }
      if (pacePrimed && paceBinaryCount > 0) {
        if (now - paceNextDue > 2 * paceInterval) {
          // Re-anchor after a long stall instead of machine-gunning the
          // backlog through the cadence (fast-forward bounds the depth).
          paceNextDue = now;
        }
        // Present every due frame, capped per invocation: a throttled driver
        // (1Hz setTimeout in a hidden tab) must still keep up, but a
        // recovering stall shouldn't machine-gun the backlog.
        let budget = 3;
        while (budget > 0 && paceBinaryCount > 0 && now >= paceNextDue) {
          budget--;
          pacePresentOne();
          // Nudge the cadence a few percent to hold the cushion at target
          // depth — imperceptible, but stops underruns from permanently
          // ratcheting latency upward (and overruns from accumulating).
          const drift = Math.max(-2, Math.min(2, paceBinaryCount - PACE_TARGET_DEPTH));
          paceNextDue += paceInterval * (1 - 0.02 * drift);
        }
      }
      if (paceQueue.length) paceSchedule();
    }

    function paceEnqueue(event) {
      const isText = typeof event.data === 'string';
      if (isText) {
        if (paceQueue.length === 0) {
          // Nothing buffered ahead of it — no ordering to preserve.
          onText(event.data);
          return;
        }
        paceQueue.push({ text: event.data });
      } else {
        const now = performance.now();
        if (!paceFirstArrival) paceFirstArrival = now;
        paceArrivals.push(now);
        if (paceArrivals.length > PACE_WINDOW) paceArrivals.shift();
        if (paceArrivals.length >= 8) {
          const span = paceArrivals[paceArrivals.length - 1] - paceArrivals[0];
          const mean = span / (paceArrivals.length - 1);
          paceInterval = Math.min(PACE_MAX_INTERVAL, Math.max(PACE_MIN_INTERVAL, mean));
        }
        paceQueue.push({ bytes: new Uint8Array(event.data) });
        paceBinaryCount++;
        if (paceBinaryCount > PACE_HARD_QUEUE) {
          // rAF isn't firing (hidden tab): drain inline to cap memory.
          paceFastForward(PACE_TARGET_DEPTH);
        }
      }
      paceSchedule();
    }

    function connect() {
      if (stopped) return;
      if (paceEnabled) paceReset();
      const ws = new WebSocket(websocketAddress(window.location.href));
      socket = ws;
      ws.binaryType = 'arraybuffer';
      onStatus('connecting');

      ws.onmessage = event => {
        if (socket !== ws) return;
        if (paceEnabled) {
          paceEnqueue(event);
        } else if (typeof event.data === 'string') {
          onText(event.data);
        } else {
          parse(new Uint8Array(event.data));
          if (onFrame) onFrame();
        }
      };

      ws.onopen = () => {
        if (socket !== ws) return;
        onStatus('open');
        reconnectDelay = 1000;
        reconnecting = false;
      };

      ws.onclose = () => {
        if (socket !== ws) return;
        socket = null;
        onStatus('closed');
        if (!stopped && !reconnecting) {
          reconnecting = true;
          setTimeout(() => {
            reconnecting = false;
            reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            connect();
          }, reconnectDelay);
        }
      };

      ws.onerror = () => {
        if (socket !== ws) return;
        try { ws.close(); } catch (e) {}
      };
    }

    function sendPacket(bytes) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(bytes);
    }

    function sendCommand(text) {
      const asciiBytes = [];
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i);
        if (code >= 32 && code < 127) asciiBytes.push(code);
      }
      if (asciiBytes.length === 0) return;
      const packet = new Uint8Array(asciiBytes.length + 3);
      packet[0] = 0x81;
      writeU16(packet, 1, asciiBytes.length);
      packet.set(asciiBytes, 3);
      sendPacket(packet);
    }

    function clickMap(mapX, mapY) {
      const ml = mapLayer();
      const layerId = ml ? ml.id : 0;
      const move = new Uint8Array(6);
      move[0] = 0x82;
      writeI16(move, 1, mapX);
      writeI16(move, 3, mapY);
      move[5] = layerId & 255;
      const down = new Uint8Array(9);
      down[0] = 0x82;
      writeI16(down, 1, mapX);
      writeI16(down, 3, mapY);
      down[5] = layerId & 255;
      down[6] = 0x83;
      down[7] = 0x01;
      down[8] = 1;
      sendPacket(down);
      const up = new Uint8Array(9);
      up[0] = 0x82;
      writeI16(up, 1, mapX);
      writeI16(up, 3, mapY);
      up[5] = layerId & 255;
      up[6] = 0x83;
      up[7] = 0x01;
      up[8] = 0;
      sendPacket(up);
    }

    function getTransform() {
      return {
        scale,
        offsetX,
        offsetY,
        nativeW,
        nativeH
      };
    }

    function setViewportFit() {
      updateNativeSize();
      computeFit();
      scheduleDraw();
    }

    function setVerticalBias(bias) {
      verticalBias = bias;
      computeFit();
      scheduleDraw();
    }

    function start() {
      updateNativeSize();
      computeFit();
      connect();
      scheduleDraw();
    }

    function stop() {
      stopped = true;
      if (socket) {
        socket.close();
        socket = null;
      }
      if (rafHandle) {
        cancelAnimationFrame(rafHandle);
        rafHandle = null;
      }
      if (paceRaf) {
        cancelAnimationFrame(paceRaf);
        paceRaf = null;
      }
      if (paceTimer) {
        clearTimeout(paceTimer);
        paceTimer = null;
      }
    }

    function getPaceStats() {
      return {
        enabled: paceEnabled,
        queued: paceBinaryCount,
        presented: pacePresented,
        interval: paceInterval,
        primed: pacePrimed
      };
    }

    return {
      start,
      sendCommand,
      clickMap,
      getTransform,
      setViewportFit,
      setVerticalBias,
      getPaceStats,
      stop
    };
  }

  window.BroadcastCore = { create: BroadcastCore };
})();

</script>

<script>
(function () {
  'use strict';

  // ---- palette (mirrors board tints so chrome matches the arena) ----
  var RED = '#e0523a', BLUE = '#3f7cc4', AMBER = '#e8a33d', PAPER = '#f2e8d8';
  var SPEEDS = [1, 2, 3, 4, 8, 16];
  var FPS = 24;

  // Two independent tempo levers (§11, L20):
  //  (1) ANIM_MAX_FACTOR — chrome beat animations never play faster than this
  //      no matter the replay speed, so feed rows / flips / banners keep their
  //      read time at 8-16×. Applied as an animationFactor cap on durations.
  //  (2) DWELL_FLOOR_MS — a beat's on-screen hold has a wall-clock minimum
  //      (feed row / banner / curtain), collapsing only the dead time between
  //      contacts. These are NOT one speed knob — one caps motion, one floors dwell.
  var ANIM_MAX_FACTOR = 2;
  var DWELL_FLOOR_MS = { feed: 2600, banner: 1900, curtain: 2400, read: 600 };
  function animFactor() {
    // Lever 1 — the chrome plays at min(replaySpeed, cap): at 16× the board flies
    // but a kill row still slides in at 2×-equivalent so a human can read it.
    var sp = (lastState && lastState.sp) || 1;
    return Math.min(sp, ANIM_MAX_FACTOR);
  }
  function dwellFloor(kind) {
    // Lever 2 — a beat's on-screen hold has a wall-clock minimum regardless of
    // replay speed; speed collapses only the dead time between contacts, never
    // the read time of a beat itself. Independent of the animFactor cap.
    return DWELL_FLOOR_MS[kind] || DWELL_FLOOR_MS.read;
  }
  // Beat-pause (§11): freeze chrome ambient the instant a beat lands so idle
  // life never competes with a kill/steal/capture. Held for the READ_PAUSE floor
  // (≥600ms wall-clock), then released. The board's own 24Hz is never touched.
  var beatPulseTimer = null;
  function beatPulse() {
    stage.classList.add('beat-active');
    if (beatPulseTimer) clearTimeout(beatPulseTimer);
    beatPulseTimer = setTimeout(function () {
      stage.classList.remove('beat-active');
      beatPulseTimer = null;
    }, dwellFloor('read'));
  }

  var $ = function (id) { return document.getElementById(id); };
  var viewport = $('viewport');
  var stage = $('stage');
  var canvas = $('board');
  var statusEl = $('status');

  // ---- embed mode (League Replayer) ----------------------------------------
  // When loaded inside the League Replayer shell (?embed=1), this client renders
  // ONLY the board (its own scorebug/transport/feed chrome is hidden by CSS via
  // body[data-embed]) and streams each parsed state frame up to the parent shell
  // over postMessage. The shell owns the walls + scorebug + KDA + standings and
  // draws them from this stream, so there is ONE websocket / ONE transport /
  // perfect tick-sync between the embedded game and the wall HUD.
  var EMBED = false;
  try { EMBED = new URLSearchParams(location.search).get('embed') === '1'; } catch (e) {}
  if (EMBED) document.body.setAttribute('data-embed', '1');
  function postToShell(type, payload) {
    if (!EMBED || window.parent === window) return;
    try { window.parent.postMessage({ src: 'ctf-replay', type: type, data: payload }, '*'); } catch (e) {}
  }

  // The whole replay is ONE fixed-aspect composition locked to the board's
  // native size (sim.nim MapWidth×MapHeight = 1235×659). The stage is sized to
  // this aspect inside the embed box and every overlay scales with it, so the
  // chrome can never drift off the graphics regardless of the Observatory
  // container's shape (§2 real-container-target, L82 bounded-embed).
  var BOARD_W = 1235, BOARD_H = 659;
  var BOARD_ASPECT = BOARD_W / BOARD_H;

  // ---- flag icon svg (HOME/TAKEN are the only two states — F2) ----
  function buildFlag(el, color) {
    el.innerHTML =
      '<svg viewBox="0 0 26 30" aria-hidden="true">' +
      '<rect x="4" y="2" width="2" height="26" fill="#2a1f16"/>' +
      '<g class="cloth"><path d="M6 3 L22 3 L18 9 L22 15 L6 15 Z" fill="' + color + '"/></g>' +
      '<rect x="1" y="26" width="10" height="3" fill="#8a7f72"/>' +
      '</svg>' +
      '<div class="carrier-tag"></div>';
  }
  buildFlag($('flag-red'), RED);
  buildFlag($('flag-blue'), BLUE);

  // ---- speed chips ----
  var speedChipsEl = $('speedchips');
  var speedChipEls = {};
  SPEEDS.forEach(function (s) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.textContent = s + '×';
    b.setAttribute('aria-label', s + 'x speed');
    b.addEventListener('click', function () { setSpeed(s); });
    speedChipsEl.appendChild(b);
    speedChipEls[s] = b;
  });

  // ---- core (board renderer + WS) ----
  var lastState = null;
  var core = window.BroadcastCore.create({
    canvas: canvas,
    onText: function (txt) { onFrame(txt); },
    onStatus: function (st) { onStatus(st); },
    onFirstFrame: function () { core.setViewportFit(); }
  });

  function send(cmd) { core.sendCommand(cmd); }

  // Transport commands relayed DOWN from the League Replayer shell (embed mode):
  // the shell's wall-mounted transport buttons/scrubber postMessage a command
  // string, which we forward to the single shared replay websocket. Same command
  // vocabulary the local transport uses, so the shell drives playback 1:1.
  if (EMBED) {
    window.addEventListener('message', function (ev) {
      var m = ev.data;
      if (!m || m.src !== 'ctf-shell') return;
      if (m.type === 'cmd' && typeof m.cmd === 'string') send(m.cmd);
      else if (m.type === 'seek' && m.tick != null) send('s:' + m.tick);
      else if (m.type === 'pov' && m.slot != null) send('v:' + m.slot);
    });
  }

  function onStatus(st) {
    statusEl.textContent = st;
    statusEl.classList.toggle('show', st !== 'open');
    if (st === 'open') {
      // Opt in to the JSON chrome channel (REPLAY-ONLY; legacy client never sends this).
      send('hud:on');
    }
  }

  // ============================================================
  //  Frame ingest
  // ============================================================
  var lastTick = -1;
  var seenMarkers = {}; // tick|kind -> true, for scrubber beat markers
  var momentumSamples = []; // {t, diff}

  function onFrame(txt) {
    var s;
    try { s = JSON.parse(txt); } catch (e) { return; }
    lastState = s;

    // Stream the parsed frame to the League Replayer shell (embed mode). The
    // shell reads roster/KDA, clock, lives, flags and pov straight off this to
    // paint the wall-mounted scorebug + KDA tables in lockstep with the board.
    postToShell('frame', s);

    // Detect a jump (seek/loop): clear transient beats so nothing phantoms.
    var jumped = (s.t < lastTick) || (lastTick >= 0 && s.t - lastTick > (s.sp || 1) * 4 + 2);
    if (jumped) { clearFeed(); clearBanners(); }

    renderScorebug(s);
    renderClock(s);
    renderTransport(s);
    renderPov(s);
    renderMismatch(s);

    if (s.events && s.events.length && !jumped) {
      for (var i = 0; i < s.events.length; i++) applyEvent(s.events[i], s);
    }
    // Even on a jump, register beat markers we can place from state? Markers
    // come from events only; on a jump the tracker resync'd (no events), so we
    // keep whatever markers we already collected.
    ingestLeadSeries(s);
    recordMomentum(s);

    if (s.ph === 'gameover') { renderEndcard(s); }
    else { $('endcard').classList.remove('on'); }

    lastTick = s.t;
  }

  // The server ships the full-match lives-lead change-point series ONCE (on the
  // first HUD frame). Cache it so the momentum graph draws its whole-timeline
  // shape immediately, with the playhead riding across a curve that's already
  // there — a broadcast win-probability graph, not a line that grows as it plays.
  function ingestLeadSeries(s) {
    if (!s.lead || fullLeadSeries) return;
    fullLeadSeries = s.lead.map(function (p) { return { t: p[0], diff: p[1] }; });
    momentumDirty = true;
  }

  // ---------- scorebug ----------
  // One pip per PLAYER (8), keyed by stable join slot: lit = alive, dim = down
  // but has lives left, hollow = eliminated. The strip is the "who's left"
  // read (the roster IS the counter); the numeral is the exact lives count.
  // Each pip is clickable → POV lens. NEVER shows kills (F1: kills ≠ score).
  function renderSquad(el, players, pov) {
    var key = players.map(function (p) { return p.s; }).join(',');
    if (el._key !== key) {
      el.innerHTML = ''; el._pips = {};
      players.forEach(function (p) {
        var pip = document.createElement('span');
        pip.className = 'squad-pip';
        pip.title = shortName(p.name);
        pip.addEventListener('click', function () { togglePov(p.s); });
        el.appendChild(pip);
        el._pips[p.s] = pip;
      });
      el._key = key;
    }
    players.forEach(function (p) {
      var pip = el._pips[p.s];
      if (!pip) return;
      var eliminated = !p.alive && p.lives <= 0;
      pip.classList.toggle('down', !p.alive && p.lives > 0);
      pip.classList.toggle('out', eliminated);
      pip.classList.toggle('carry', !!p.carry);
      pip.classList.toggle('pov', pov === p.s);
    });
  }

  function renderScorebug(s) {
    var tr = s.teams || {};
    var red = tr.red || {}, blue = tr.blue || {};
    var rl = red.lives || 0, bl = blue.lives || 0;

    setName('name-red', teamName(s, 'red', 'RED'));
    setName('name-blue', teamName(s, 'blue', 'BLUE'));

    $('lives-red').textContent = rl;
    $('lives-blue').textContent = bl;

    // squad pips per team (one per player), sorted by stable join slot
    var reds = [], blues = [];
    (s.roster || []).forEach(function (p) { (p.team === 'red' ? reds : blues).push(p); });
    reds.sort(function (a, b) { return a.s - b.s; });
    blues.sort(function (a, b) { return a.s - b.s; });
    renderSquad($('squad-red'), reds, s.pov);
    renderSquad($('squad-blue'), blues, s.pov);

    updateFlag('flag-red', 'red', red, s);
    updateFlag('flag-blue', 'blue', blue, s);

    // leader pulse when lead >= 3
    var rp = document.querySelector('.plate.red');
    var bp = document.querySelector('.plate.blue');
    rp.classList.toggle('leader', rl - bl >= 3 && s.ph === 'playing');
    bp.classList.toggle('leader', bl - rl >= 3 && s.ph === 'playing');
  }

  function teamName(s, team, fallback) {
    // The scorebug headline is the POLICY name, not the color (the plate color +
    // board already say which side is which). In a hosted league every player on
    // a side is the SAME policy, so the whole team shares one name — show it.
    // In local self-play each baseline bot has a distinct generated name
    // (Player1, Player2, …) with no shared identity, so fall back to the color
    // label rather than pinning the whole team to one arbitrary bot.
    if (!s.roster) return fallback;
    var name = null, mixed = false;
    for (var i = 0; i < s.roster.length; i++) {
      var p = s.roster[i];
      if (p.team !== team) continue;
      // Strip the per-seat " (N)" suffix the hosted runtime appends to the SAME
      // policy's multiple connections ("softmaxwell (2)", "softmaxwell (7)"…) so
      // every seat of one policy collapses to a single shared name here. The
      // killfeed shows the full per-seat name (it colors names per event and
      // never compares them); the headline needs one shared identity, and this
      // suffix was tripping the "mixed" check and pinning the header to RED/BLUE.
      // Distinct local self-play names (Player1, Player2) carry no such suffix,
      // so they still differ and correctly fall back to the color.
      var nm = String(p.name || '').replace(/\s*\(\d+\)\s*$/, '');
      if (name === null) name = nm;
      else if (nm !== name) { mixed = true; break; }
    }
    if (name === null || mixed || name === '') return fallback;
    return teamHeadline(name);
  }
  function teamHeadline(n) {
    // Format a policy identity for the scorebug headline: drop any host:port
    // suffix, restore the spaces the server encodes as underscores, and let the
    // plate's CSS ellipsis clip anything still too wide (no hard char cut, so a
    // full name reads whole when it fits).
    n = String(n || '');
    var at = n.indexOf('@'); if (at > 0) n = n.slice(0, at);
    n = n.replace(/_/g, ' ').trim();
    return (n || '?').toUpperCase();
  }
  function setName(id, txt) { var el = $(id); if (el.textContent !== txt) el.textContent = txt; }

  function updateFlag(id, team, tstate, s) {
    var el = $(id);
    var taken = tstate.flag === 'taken';
    var was = el.classList.contains('taken');
    el.classList.toggle('taken', taken);
    if (was !== taken) { el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); }
    var tag = el.querySelector('.carrier-tag');
    if (tag) {
      if (taken && tstate.carrier >= 0) {
        tag.textContent = shortName(rosterName(s, tstate.carrier));
      } else { tag.textContent = ''; }
    }
  }

  function rosterName(s, slot) {
    if (!s.roster) return '#' + slot;
    for (var i = 0; i < s.roster.length; i++) {
      if (s.roster[i].s === slot) return s.roster[i].name || ('#' + slot);
    }
    return '#' + slot;
  }
  function shortName(n) {
    n = String(n || '');
    // Names are player addresses; keep them short + readable.
    var at = n.indexOf('@'); if (at > 0) n = n.slice(0, at);
    if (n.length > 10) n = n.slice(0, 10);
    return n || '?';
  }

  // ---------- clock ----------
  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60), r = sec % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }
  function renderClock(s) {
    var timeEl = $('clock-time'), capEl = $('clock-caption'), clk = $('clock');
    if (s.ph === 'lobby') {
      timeEl.textContent = s.lob > 0 ? (':' + (s.lob < 10 ? '0' : '') + s.lob) : '--';
      capEl.textContent = s.lob > 0 ? 'Starting in' : 'Waiting for players';
      clk.classList.remove('tiebreak-warn');
    } else if (s.ph === 'gameover') {
      timeEl.textContent = 'FINAL';
      capEl.textContent = 'Game over';
      clk.classList.remove('tiebreak-warn');
    } else {
      // Playing: an HONEST countdown to the scheduled draw limit, not to the
      // replay's end. The game is scheduled to end at absolute tick st + mt
      // (gameStartTick + maxTicks, the scoreless-draw ceiling); the clock counts
      // down to that. A game decided early by a capture or wipe FREEZES the
      // clock at whatever was left and flips to FINAL — so a nonzero freeze
      // reads as "ended it early", and only a genuine grind to the limit ever
      // reaches 0:00. (Old behavior pinned the end to mx = the replay's last
      // tick, so every game counted to zero and the race-to-zero was an
      // artifact.) When no limit is configured (mt <= 0) there is no scheduled
      // end to count toward, so fall back to the replay span.
      var end = (s.mt && s.mt > 0) ? ((s.st || 0) + s.mt) : s.mx;
      var remain = Math.max(0, (end - s.t)) / FPS;
      timeEl.textContent = fmt(remain);
      capEl.textContent = 'Time left';
      clk.classList.toggle('tiebreak-warn', remain <= 30);
    }
  }

  // ---------- transport ----------
  function renderTransport(s) {
    $('transport').classList.toggle('disabled', !s.en);
    var playBtn = $('btn-play');
    playBtn.textContent = s.pl ? '❘❘' : '▶';
    $('btn-loop').classList.toggle('on', !!s.lp);

    // speed chips
    SPEEDS.forEach(function (sp) { speedChipEls[sp].classList.toggle('on', sp === s.sp); });

    // scrubber. The x-axis skips the dead lobby: it spans [startTick, maxTick]
    // so tick 0 on-screen is the first frame of actual play, not "WAITING FOR
    // PLAYERS". All the derived geometry (fill, head, clock, beats, momentum)
    // shares this offset origin.
    var st = Math.max(0, s.st || 0);
    var mx = Math.max(st + 1, s.mx || 1);
    var span = mx - st;
    var frac = Math.min(1, Math.max(0, (s.t - st) / span));
    $('scrub-fill').style.width = (frac * 100) + '%';
    $('scrub-head').style.left = (frac * 100) + '%';
    $('tick-clock').textContent = Math.max(0, s.t - st) + ' / ' + span;

    renderBeatMarkers(st, mx);
    renderMomentum();
  }

  // ---------- pov + mismatch ----------
  function renderPov(s) {
    var badge = $('povBadge');
    badge.classList.toggle('on', s.pov >= 0);
    if (s.pov >= 0) badge.textContent = '👁 POV: ' + shortName(rosterName(s, s.pov)) + ' — click to clear';
    renderFpv(s);
  }

  // First-person picture-in-picture: draw the selected seat's raycast view into
  // the bottom-right inset. Wolfenstein-style — each column is one wall slice
  // whose height is inversely proportional to distance (walls are "full-screen
  // high" so an enemy running across the mouth of a lane reads as a figure
  // sweeping between wall faces), with billboarded soldiers/hearts drawn on top.
  var fpvEl = $('fpv'), fpvCanvas = $('fpv-canvas'), fpvCtx = null;

  // Drag-to-reposition the first-person inset. Grab it anywhere; we pin via
  // left/top (dropping the right/bottom anchor) and clamp inside the stage so it
  // can never be dragged off-screen. Purely a viewer convenience — no state sent.
  (function makeFpvDraggable() {
    var dragging = false, startX = 0, startY = 0, baseLeft = 0, baseTop = 0;
    fpvEl.addEventListener('pointerdown', function (ev) {
      if (ev.button !== 0) return;
      var rect = fpvEl.getBoundingClientRect();
      var host = (fpvEl.offsetParent || document.body).getBoundingClientRect();
      baseLeft = rect.left - host.left;
      baseTop = rect.top - host.top;
      startX = ev.clientX;
      startY = ev.clientY;
      dragging = true;
      fpvEl.classList.add('dragging');
      // Switch to left/top anchoring at the current spot, then move from there.
      fpvEl.classList.add('moved');
      fpvEl.style.left = baseLeft + 'px';
      fpvEl.style.top = baseTop + 'px';
      fpvEl.setPointerCapture(ev.pointerId);
      ev.preventDefault();
    });
    fpvEl.addEventListener('pointermove', function (ev) {
      if (!dragging) return;
      var host = (fpvEl.offsetParent || document.body).getBoundingClientRect();
      var w = fpvEl.offsetWidth, h = fpvEl.offsetHeight;
      var nx = baseLeft + (ev.clientX - startX);
      var ny = baseTop + (ev.clientY - startY);
      nx = Math.max(0, Math.min(nx, host.width - w));
      ny = Math.max(0, Math.min(ny, host.height - h));
      fpvEl.style.left = nx + 'px';
      fpvEl.style.top = ny + 'px';
    });
    function endDrag(ev) {
      if (!dragging) return;
      dragging = false;
      fpvEl.classList.remove('dragging');
      try { fpvEl.releasePointerCapture(ev.pointerId); } catch (e) {}
    }
    fpvEl.addEventListener('pointerup', endDrag);
    fpvEl.addEventListener('pointercancel', endDrag);
  })();

  function renderFpv(s) {
    var show = s.pov >= 0 && s.fp && s.fp.cols;
    fpvEl.classList.toggle('on', !!show);
    if (!show) return;
    if (!fpvCtx) fpvCtx = fpvCanvas.getContext('2d');

    var fp = s.fp;
    var cols = fp.cols, n = cols.length;
    // Back the canvas at the inset's on-screen size × dpr for crisp slices.
    var dpr = window.devicePixelRatio || 1;
    var cssW = fpvCanvas.clientWidth || 200, cssH = fpvCanvas.clientHeight || 133;
    var W = Math.max(1, Math.round(cssW * dpr)), H = Math.max(1, Math.round(cssH * dpr));
    if (fpvCanvas.width !== W) fpvCanvas.width = W;
    if (fpvCanvas.height !== H) fpvCanvas.height = H;
    var ctx = fpvCtx;
    ctx.imageSmoothingEnabled = false;

    // Sky (upper) over floor (lower): a warm dusk gradient split at the horizon
    // — never a flat void. Matches the stage's ink-and-print warmth.
    var horizon = H * 0.5;
    var sky = ctx.createLinearGradient(0, 0, 0, horizon);
    sky.addColorStop(0, '#241a12'); sky.addColorStop(1, '#3a2b1c');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, horizon);
    var floor = ctx.createLinearGradient(0, horizon, 0, H);
    floor.addColorStop(0, '#1a130d'); floor.addColorStop(1, '#0c0906');
    ctx.fillStyle = floor; ctx.fillRect(0, horizon, W, H - horizon);

    // The projection constant: a wall one "unit" tall at distance d spans
    // (WALL_SCALE / d) px. The walls are conceptually full-height corridor walls,
    // so WALL_SCALE is large — a near wall clamps to the whole frame and even a
    // mid-arena wall stays tall and enclosing (the "walls full screen high" the
    // seat's own eyes would see), while distance still reads as a clear shrink.
    // FALLOFF sets how fast warmth sinks to ink with depth; it's scaled to real
    // corridor distances (~600px), not gun range, so near/far contrast is legible.
    var colW = W / n;
    var WALL_SCALE = H * 160;
    var FALLOFF = 620;
    for (var i = 0; i < n; i++) {
      var dist = cols[i];
      if (dist < 0) continue;              // clean miss: open lane to the sky
      var d = Math.max(6, dist);
      var h = Math.min(H, WALL_SCALE / d);
      var x = Math.floor(i * colW);
      var w = Math.ceil(colW) + 1;
      var top = horizon - h / 2;
      // Distance shading: near walls bright warm stone, far walls sink to ink.
      var shade = Math.max(0.2, 1 - d / FALLOFF);
      var r = Math.round(150 * shade + 22);
      var g = Math.round(118 * shade + 16);
      var b = Math.round(88 * shade + 12);
      ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      ctx.fillRect(x, top, w, h);
    }

    // Billboarded entities, far-to-near so nearer figures overdraw. Each sits at
    // horizontal fraction o∈[-1,1] across the frame; its size tracks distance
    // exactly like a wall slice (a soldier is ~0.62 of the corridor's height), so
    // it scales into the corridor believably and stays legible as it runs across.
    var ents = (fp.ents || []).slice().sort(function (a, b) { return b.d - a.d; });
    for (var j = 0; j < ents.length; j++) {
      var e = ents[j];
      var ed = Math.max(6, e.d);
      var fig = Math.min(H * 0.92, WALL_SCALE * 0.62 / ed);
      var ex = W * 0.5 + (e.o || 0) * W * 0.5;
      var ey = horizon;
      drawFpvEntity(ctx, e, ex, ey, fig);
    }
  }

  function drawFpvEntity(ctx, e, cx, cy, figH) {
    var col = e.team === 'red' ? RED : (e.team === 'blue' ? BLUE : AMBER);
    if (e.k === 'heart') {
      // A heart on its pedestal: a small diamond glyph, team-tinted.
      var s = figH * 0.5;
      ctx.save();
      ctx.translate(cx, cy - s * 0.5);
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.5); ctx.lineTo(s * 0.5, 0);
      ctx.lineTo(0, s * 0.5); ctx.lineTo(-s * 0.5, 0);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      return;
    }
    // A soldier: a simple head+body silhouette, feet on the horizon, team-tinted
    // with a paper outline so it separates from the wall behind it. A carrier
    // gets an amber heart pip above the head.
    var bodyW = figH * 0.42;
    var headR = figH * 0.16;
    var feet = cy + figH * 0.5;
    var headCy = feet - figH + headR;
    ctx.save();
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(12,8,5,0.85)';
    ctx.lineWidth = Math.max(1, figH * 0.05);
    // body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.rect(cx - bodyW / 2, headCy + headR * 0.6, bodyW, figH - headR * 1.6);
    ctx.fill(); ctx.stroke();
    // head
    ctx.beginPath();
    ctx.arc(cx, headCy, headR, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // mate ring so teammates read distinct from enemies at a glance
    if (e.k === 'mate') {
      ctx.strokeStyle = PAPER;
      ctx.lineWidth = Math.max(1, figH * 0.04);
      ctx.beginPath();
      ctx.arc(cx, headCy, headR * 1.5, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (e.carry) {
      ctx.fillStyle = AMBER;
      var hs = headR * 0.9;
      var hy = headCy - headR * 1.9;
      ctx.beginPath();
      ctx.moveTo(cx, hy - hs * 0.5); ctx.lineTo(cx + hs * 0.5, hy);
      ctx.lineTo(cx, hy + hs * 0.5); ctx.lineTo(cx - hs * 0.5, hy);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  function renderMismatch(s) {
    $('mmwarn').classList.toggle('on', s.mm >= 0);
  }

  // ============================================================
  //  Beats → surfaces  (§5)
  // ============================================================
  function applyEvent(e, s) {
    switch (e.k) {
      case 'kill': onKill(e, s); markBeat(e.t, 'kill'); beatPulse(); break;
      case 'steal': onSteal(e, s); markBeat(e.t, 'steal'); beatPulse(); break;
      case 'return': onReturn(e, s); beatPulse(); break;
      case 'capture': onCapture(e, s); markBeat(e.t, 'capture'); beatPulse(); break;
      case 'respawn': /* board rematerialize handles this visually */ break;
      case 'gameover': /* end-card is state-driven */ break;
      case 'phase': /* clock caption handles phase */ break;
    }
  }

  // Slots already drawn as the partner of a provable same-tick trade, so the
  // second half of the pair is suppressed (one linked row, not two). Keyed by
  // "tick:victimSlot"; a tiny ring is plenty since only same-tick pairs matter.
  var tradeConsumed = {};
  function onKill(e, s) {
    var killer = e.killer, victim = e.victim;
    var victimTeam = teamOf(s, victim);
    var killerTeam = killer >= 0 ? teamOf(s, killer) : null;
    var glyph = '▸';
    var badge = '';
    if (e.trade !== undefined && e.trade >= 0) {
      // Provable mutual trade: the server proved these two killed each other
      // this tick (the two killers ARE the two victims). Draw ONE linked row
      // with both names; skip the partner's own event so it isn't doubled.
      if (tradeConsumed[e.t + ':' + victim]) { delete tradeConsumed[e.t + ':' + victim]; return; }
      tradeConsumed[e.t + ':' + e.trade] = true;
      var row = document.createElement('div');
      row.className = 'feed-row';
      row.innerHTML = '<span class="who ' + (victimTeam || '') + '">' + esc(shortName(rosterName(s, victim))) + '</span>' +
        '<span class="glyph">⇄</span>' +
        '<span class="who ' + (teamOf(s, e.trade) || '') + '">' + esc(shortName(rosterName(s, e.trade))) + '</span>' +
        '<span class="badge">traded</span>';
      pushFeed(row);
      return;
    }
    var row = document.createElement('div');
    row.className = 'feed-row';
    if (e.amb) {
      // Same-tick multi-kill the sim can't pair (a 3-way pileup or two
      // independent kills). Attribution is honestly unknown (F7): show the
      // victim with a neutral marker, never a fabricated killer or "traded".
      badge = '<span class="badge">double KO</span>';
      row.innerHTML = '<span class="who ' + (victimTeam || '') + '">' + esc(shortName(rosterName(s, victim))) + '</span>' + badge;
    } else {
      if (e.tk) { badge = '<span class="badge tk">team kill</span>'; row.classList.add('flagkill'); }
      var killerName = killer >= 0 ? shortName(rosterName(s, killer)) : 'the arena';
      row.innerHTML = '<span class="who ' + (killerTeam || '') + '">' + esc(killerName) + '</span>' +
        '<span class="glyph">' + glyph + '</span>' +
        '<span class="who ' + (victimTeam || '') + '">' + esc(shortName(rosterName(s, victim))) + '</span>' + badge;
    }
    pushFeed(row);
  }

  function onSteal(e, s) {
    var flagTeam = e.flag; // the team whose flag was TAKEN
    var thief = shortName(rosterName(s, e.by));
    banner((flagTeam === 'red' ? 'RED' : 'BLUE') + ' FLAG TAKEN', 'steal ' + (flagTeam + '-accent'));
  }
  function onReturn(e, s) {
    var flagTeam = e.flag;
    banner((flagTeam === 'red' ? 'RED' : 'BLUE') + ' FLAG RETURNED', 'returned ' + (flagTeam + '-accent'));
  }
  function onCapture(e, s) {
    var byTeam = teamOf(s, e.by);
    banner((byTeam === 'red' ? 'RED' : 'BLUE') + ' CAPTURES', 'wipe ' + (byTeam + '-accent'));
  }

  function teamOf(s, slot) {
    if (slot < 0 || !s.roster) return null;
    for (var i = 0; i < s.roster.length; i++) if (s.roster[i].s === slot) return s.roster[i].team;
    return null;
  }
  function esc(t) { return String(t).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }

  // ---------- kill feed queue (fixed reserve, dwell floor) ----------
  var feedEl = $('killfeed');
  var MAX_FEED = 4;
  function pushFeed(row) {
    feedEl.insertBefore(row, feedEl.firstChild);
    while (feedEl.children.length > MAX_FEED) feedEl.removeChild(feedEl.lastChild);
    // Dwell floor (lever 2): a wall-clock minimum so the row reads even at 16×.
    var hold = dwellFloor('feed');
    // animFactor cap (lever 1): the slide-in duration never dips below its
    // read-time, so the row still overshoots-and-settles legibly at high speed.
    row.style.animationDuration = (250 / animFactor()) + 'ms';
    setTimeout(function () {
      if (row.parentNode) { row.classList.add('leaving'); setTimeout(function () { if (row.parentNode) row.parentNode.removeChild(row); }, 300); }
    }, hold);
  }
  function clearFeed() { feedEl.innerHTML = ''; }

  // ---------- banner lane queue (one at a time, min hold) ----------
  var bannerEl = $('bannerlane');
  var bannerQueue = [];
  var bannerBusy = false;
  function banner(text, cls) {
    bannerQueue.push({ text: text, cls: cls });
    pumpBanner();
  }
  function pumpBanner() {
    if (bannerBusy || !bannerQueue.length) return;
    bannerBusy = true;
    var b = bannerQueue.shift();
    var chip = document.createElement('div');
    chip.className = 'banner-chip ' + b.cls;
    chip.textContent = b.text;
    bannerEl.appendChild(chip);
    // lever 1 (animFactor cap): the pop-in never plays faster than 2x, so a
    // fast-forward scrub can't reduce a banner to a subliminal flash.
    chip.style.animationDuration = (300 / animFactor()) + 'ms';
    var hold = dwellFloor('banner'); // lever 2: wall-clock dwell floor (~1.9s)
    setTimeout(function () {
      chip.classList.add('leaving');
      setTimeout(function () {
        if (chip.parentNode) chip.parentNode.removeChild(chip);
        bannerBusy = false;
        pumpBanner();
      }, 260);
    }, hold);
  }
  function clearBanners() {
    bannerQueue = [];
    bannerEl.innerHTML = '';
    bannerBusy = false;
  }

  // ---------- scrubber beat markers ----------
  var scrubEl = $('scrub');
  function markBeat(tick, kind) {
    var mk = tick + '|' + kind;
    if (seenMarkers[mk]) return;
    seenMarkers[mk] = { tick: tick, kind: kind };
    pendingMarkers.push({ tick: tick, kind: kind });
  }
  var pendingMarkers = [];
  function renderBeatMarkers(st, mx) {
    if (!pendingMarkers.length) return;
    var span = Math.max(1, mx - st);
    pendingMarkers.forEach(function (m) {
      var el = document.createElement('div');
      el.className = 'beat-marker ' + m.kind;
      el.style.left = (Math.min(1, Math.max(0, (m.tick - st) / span)) * 100) + '%';
      scrubEl.appendChild(el);
    });
    pendingMarkers = [];
  }

  // ---------- momentum graph (lives-lead over the WHOLE timeline) ----------
  // A step line + difference shading on the SAME 0→maxTicks x-axis as the seek
  // track, so a point's x IS its tick. Positive = Red leads (red shading above
  // the even-lives midline), negative = Blue leads (blue below). Samples are
  // keyed by tick (dedup) and accumulate for the whole replay — NOT a scrolling
  // window — so the curve stays put while only the playhead moves across it.
  var VBW = 1000, VBH = 100, MID = 50; // SVG viewBox (preserveAspectRatio:none)
  var MOM_SVGNS = 'http://www.w3.org/2000/svg';
  var momentumSeen = {};            // tick -> true (dedup)
  var momentumDirty = true;         // rebuild the path only when a new tick lands
  var fullLeadSeries = null;        // full-match [{t,diff}] shipped once by the server
  function recordMomentum(s) {
    if (fullLeadSeries) return;     // full curve already known; nothing to accumulate
    if (s.ph !== 'playing' && s.ph !== 'gameover') return;
    if (momentumSeen[s.t]) return;  // deterministic replay: a tick's diff is fixed
    momentumSeen[s.t] = true;
    var tr = s.teams || {};
    var diff = ((tr.red && tr.red.lives) || 0) - ((tr.blue && tr.blue.lives) || 0);
    momentumSamples.push({ t: s.t, diff: diff });
    momentumDirty = true;
  }
  function renderMomentum() {
    var el = $('momentum');
    // Prefer the full precomputed series (spans the WHOLE timeline from frame 1);
    // fall back to accumulate-as-you-play only if the server didn't ship it.
    var samples = fullLeadSeries || momentumSamples;
    if (!lastState || !samples.length) { if (!samples.length) el.innerHTML = ''; return; }
    if (!momentumDirty && el.childNodes.length) return; // nothing new to draw
    momentumDirty = false;
    // Share the scrubber's trimmed [startTick, maxTick] axis so the momentum
    // curve lines up 1:1 with the playhead (the lobby prefix is flat/even and
    // carries no signal, so dropping it just removes dead leading space).
    var st = Math.max(0, lastState.st || 0);
    var mx = Math.max(st + 1, lastState.mx || 1);

    // Auto-scale to the match's ACTUAL peak lead so the swings fill the band
    // (a fixed ±24 scale squashed every real game — a 5-life lead barely lifted
    // off the midline). Each side of the even-lives midline scales on its OWN
    // extreme, so the biggest Red lead touches the top edge and the deepest Blue
    // lead touches the bottom — while 0 stays pinned at MID, keeping the red/blue
    // shading split honest. Floor at 1 so a dead-even match never divides by zero.
    var maxPos = 1, maxNeg = 1;
    samples.forEach(function (m) {
      if (m.diff > maxPos) maxPos = m.diff;
      if (-m.diff > maxNeg) maxNeg = -m.diff;
    });

    // Sort by tick and build a STEP series across the full [0, mx] axis.
    var pts = samples.slice().sort(function (a, b) { return a.t - b.t; });
    function xOf(t) { return Math.min(1, Math.max(0, (t - st) / (mx - st))) * VBW; }
    function yOf(d) { // 0 → MID; peak Red → top, peak Blue → bottom (2px inset)
      return d >= 0
        ? MID - (d / maxPos) * (MID - 2)
        : MID + (-d / maxNeg) * (MID - 2);
    }
    var line = '', k;
    for (k = 0; k < pts.length; k++) {
      var x = xOf(pts[k].t), y = yOf(pts[k].diff);
      if (k === 0) line += 'M ' + x.toFixed(1) + ' ' + y.toFixed(1);
      else line += ' H ' + x.toFixed(1) + ' V ' + y.toFixed(1); // step: hold then step
    }
    // Shaded area drops from the line to the midline and closes back.
    var lastX = xOf(pts[pts.length - 1].t);
    var area = line + ' L ' + lastX.toFixed(1) + ' ' + MID + ' L ' + xOf(pts[0].t).toFixed(1) + ' ' + MID + ' Z';

    el.setAttribute('viewBox', '0 0 ' + VBW + ' ' + VBH);
    el.innerHTML = '';
    var defs = document.createElementNS(MOM_SVGNS, 'defs');
    // Split fill: red above the midline, blue below — one gradient, hard stop.
    // userSpaceOnUse so the hard 50/50 split lands exactly on the midline
    // (y=MID) — red fills the region above it, blue below, wherever the curve is.
    defs.innerHTML =
      '<linearGradient id="momfill" gradientUnits="userSpaceOnUse" ' +
        'x1="0" y1="0" x2="0" y2="' + VBH + '">' +
      '<stop offset="0%" stop-color="' + RED + '" stop-opacity="0.8"/>' +
      '<stop offset="50%" stop-color="' + RED + '" stop-opacity="0.28"/>' +
      '<stop offset="50%" stop-color="' + BLUE + '" stop-opacity="0.28"/>' +
      '<stop offset="100%" stop-color="' + BLUE + '" stop-opacity="0.8"/>' +
      '</linearGradient>';
    el.appendChild(defs);
    // dark backing so the shading reads against a consistent ground, not the
    // flagstone floor showing through the transport gradient.
    var bg = document.createElementNS(MOM_SVGNS, 'rect');
    bg.setAttribute('x', 0); bg.setAttribute('y', 0);
    bg.setAttribute('width', VBW); bg.setAttribute('height', VBH);
    bg.setAttribute('fill', 'rgba(11,7,4,0.55)');
    el.appendChild(bg);
    // even-lives midline
    var mid = document.createElementNS(MOM_SVGNS, 'line');
    mid.setAttribute('x1', 0); mid.setAttribute('y1', MID);
    mid.setAttribute('x2', VBW); mid.setAttribute('y2', MID);
    mid.setAttribute('stroke', 'rgba(242,232,216,0.22)');
    mid.setAttribute('stroke-width', '0.8');
    el.appendChild(mid);
    var areaEl = document.createElementNS(MOM_SVGNS, 'path');
    areaEl.setAttribute('d', area);
    areaEl.setAttribute('fill', 'url(#momfill)');
    areaEl.setAttribute('stroke', 'none');
    el.appendChild(areaEl);
    var lineEl = document.createElementNS(MOM_SVGNS, 'path');
    lineEl.setAttribute('d', line);
    lineEl.setAttribute('fill', 'none');
    lineEl.setAttribute('stroke', PAPER);
    lineEl.setAttribute('stroke-width', '1.5');
    lineEl.setAttribute('stroke-opacity', '0.95');
    lineEl.setAttribute('vector-effect', 'non-scaling-stroke');
    el.appendChild(lineEl);
  }

  // ============================================================
  //  End-card (§5/§8) — reads isDraw BEFORE winner (F4); names the key (F3)
  // ============================================================
  function renderEndcard(s) {
    var card = $('endcard');
    if (!s.over) return;
    card.classList.add('on'); // own the frame at GameOver (§8) — before either verdict branch
    var o = s.over;
    var badge = $('ec-badge'), head = $('ec-headline'), how = $('ec-how');
    var redL = o.redLives, blueL = o.blueLives;
    $('ec-red').textContent = redL;
    $('ec-blue').textContent = blueL;

    if (o.draw) {
      badge.className = 'verdict-badge draw';
      badge.textContent = 'DRAW';
      head.textContent = 'NO SCORE';
      how.textContent = o.timeLimit
        ? 'Time expired before a capture or a wipe — a scoreless draw, with no tiebreak on lives.'
        : 'The match ended with neither side scoring — no winner.';
      return;
    }

    var winner = o.winner; // 'red' | 'blue'
    var winName = winner === 'red' ? 'RED' : 'BLUE';
    badge.className = 'verdict-badge ' + winner;
    badge.textContent = winName + ' WINS';
    head.textContent = winName + ' WINS';

    if (o.timeLimit) {
      // Time-limit resolution — name the key and the values (F3).
      var winL = winner === 'red' ? redL : blueL;
      var loseL = winner === 'red' ? blueL : redL;
      if (winL !== loseL) {
        how.textContent = 'Time expired — ' + winName + ' held more lives (' + winL + ' vs ' + loseL + ').';
      } else {
        how.textContent = 'Time expired — lives tied; ' + winName + ' won on flag progress.';
      }
    } else {
      var loserLives = winner === 'red' ? blueL : redL;
      if (loserLives <= 0) {
        head.textContent = winName + ' WIPES OUT ' + (winner === 'red' ? 'BLUE' : 'RED');
        how.textContent = winName + ' eliminated every opposing life.';
      } else {
        how.textContent = winName + ' captured the enemy flag.';
      }
    }
  }

  // ============================================================
  //  Transport wiring — DOM controls emit the legacy chat chars +
  //  the ctf-side s:/v: whole-string commands.
  // ============================================================
  function togglePlay() { send(' '); }
  function setSpeed(s) {
    var map = { 1: '1', 2: '2', 3: '3', 4: '4', 8: '8', 16: '6' };
    if (map[s]) send(map[s]);
  }
  $('btn-play').addEventListener('click', togglePlay);
  $('btn-restart').addEventListener('click', function () { send(','); });
  $('btn-back').addEventListener('click', function () { send('b'); });
  $('btn-fwd').addEventListener('click', function () { send('.'); });
  $('btn-end').addEventListener('click', function () { send('e'); });
  $('btn-loop').addEventListener('click', function () { send('r'); });

  // click-to-seek: map x-fraction to a tick and send s:<tick>
  $('scrub').addEventListener('click', function (ev) {
    if (!lastState || !lastState.en) return;
    var rect = this.getBoundingClientRect();
    var frac = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
    // Map the click back onto the shown [startTick, maxTick] axis.
    var st = Math.max(0, lastState.st || 0);
    var mx = Math.max(st + 1, lastState.mx || 1);
    var tick = st + Math.round(frac * (mx - st));
    send('s:' + tick);
  });

  // pov clear
  $('povBadge').addEventListener('click', function () { send('v:-1'); });
  function togglePov(slot) {
    if (lastState && lastState.pov === slot) send('v:-1');
    else send('v:' + slot);
  }

  // keyboard shortcuts mirror the transport
  window.addEventListener('keydown', function (ev) {
    if (ev.metaKey || ev.ctrlKey || ev.altKey) return;
    var k = ev.key;
    if (k === ' ') { ev.preventDefault(); togglePlay(); }
    else if (k === ',' || k === '<') send(',');
    else if (k === '.' || k === '>') send('.');
    else if (k === 'b') send('b');
    else if (k === 'e') send('e');
    else if (k === 'r') send('r');
    else if (k === '+' || k === '=') send('+');
    else if (k === '-' || k === '_') send('-');
    else if (k >= '1' && k <= '9') send(k);
  });

  // Click a soldier on the board to select it (mirrors the squad-pip lens, but
  // for anyone visible on the arena). The board canvas draws ONLY the zoomable
  // map layer, letterboxed by broadcast_core; chrome (scoreboard, transport) are
  // HTML overlays, so a canvas click is always a MAP-space click. Invert the
  // core's letterbox transform to recover native map pixels, then hand them to
  // clickMap — the server hit-tests the soldier footprint and toggles selection.
  canvas.addEventListener('click', function (ev) {
    var rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    // getBoundingClientRect is CSS px; the core's transform lives in the same
    // CSS space (offsetX/offsetY/scale are computed against clientWidth/Height,
    // NOT the dpr-scaled backing store), so no devicePixelRatio factor here.
    var cssX = ev.clientX - rect.left;
    var cssY = ev.clientY - rect.top;
    var t = core.getTransform();
    if (!t || !t.scale) return;
    var mapX = Math.round((cssX - t.offsetX) / t.scale);
    var mapY = Math.round((cssY - t.offsetY) / t.scale);
    // Ignore clicks in the letterbox bands (outside the drawn map).
    if (mapX < 0 || mapY < 0 || mapX >= t.nativeW || mapY >= t.nativeH) return;
    core.clickMap(mapX, mapY);
  });

  // ============================================================
  //  Fixed-aspect fit: size the composition to the board's native aspect
  //  inside the embed box, then scale the whole thing (board + overlays) as
  //  one unit. Chrome sizes off the STAGE width, so overlays stay locked to
  //  the graphics at any container shape (§2, L82 bounded-embed).
  // ============================================================
  function relayout() {
    var boxW = viewport.clientWidth, boxH = viewport.clientHeight;
    if (!boxW || !boxH) return;
    // The board region (game action) fits the board aspect into the box BETWEEN a
    // reserved top band (the scorebug) and bottom band (the transport), so neither
    // ever sits over play. Each band's pixel height depends on --hudscale (→ board
    // width) and the board fit depends on the bands, so iterate twice — the bands
    // are a small fraction of the height, so it converges immediately.
    var scorebug = document.getElementById('scorebug');
    var transport = document.getElementById('transport');
    var root = document.documentElement;
    var topBand = parseFloat(getComputedStyle(root).getPropertyValue('--topband')) || 0;
    var band = parseFloat(getComputedStyle(root).getPropertyValue('--band')) || 0;
    var stageW = 0, stageH = 0;
    for (var pass = 0; pass < 2; pass++) {
      var availH = Math.max(1, boxH - topBand - band);
      var boardW, boardH;
      if (boxW / availH > BOARD_ASPECT) {
        boardH = availH; boardW = Math.round(availH * BOARD_ASPECT);
      } else {
        boardW = boxW; boardH = Math.round(boxW / BOARD_ASPECT);
      }
      stageW = boardW; stageH = boardH + topBand + band;
      stage.style.width = stageW + 'px';
      stage.style.height = stageH + 'px';
      // One scale for the whole composition: chrome was authored against a
      // ~760px-wide reference board, so --hudscale is the board's on-screen width
      // over that reference (clamped so a huge featured embed doesn't bloat the
      // chrome and a tiny 360px floor stays legible).
      var scale = Math.max(0.5, Math.min(1.6, boardW / 760));
      root.style.setProperty('--hudscale', scale.toFixed(3));
      stage.classList.toggle('tiny', boardW <= 620);
      // Measure each band's natural height → reserve exactly that.
      topBand = scorebug ? scorebug.offsetHeight : 0;
      band = transport ? transport.offsetHeight : 0;
      root.style.setProperty('--topband', topBand + 'px');
      root.style.setProperty('--band', band + 'px');
    }
    core.setViewportFit();
  }
  var ro = new ResizeObserver(relayout);
  ro.observe(viewport);
  window.addEventListener('resize', relayout);

  relayout();
  core.start();
})();
</script>
</body>
</html>
