  :root{
    --stage-lo:#16110d; --stage-hi:#241a12; --surround:#0b0805;
    --paper:#f2e8d8; --paper-dim:#b8ac98;
    --ink:#2a1f16; --ink-soft:rgba(20,14,9,.72);
    --red:#e0523a; --blue:#3f7cc4; --amber:#e8a33d; --ghost:#8a7f72;
    --pixfont:'rajdhani','Segoe UI',system-ui,sans-serif;
    --finefont:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --u:1px;              /* HUD unit; scaled by layout() from board width */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--surround); color:var(--paper); font-family:var(--finefont); overflow:hidden}

  /* ============================================================
     THE LEAGUE REPLAYER: a walled stone pit. The embedded replay
     iframe is the lit floor in the middle; four dungeon walls rise
     around it to a shared vanishing point; the REAL designed
     scorebug + transport chroma (ported 1:1 from the broadcast
     replay) plus the league KDA tables + division standings ride as
     flat readable panels over the wall stone (no black bars — the
     bars ARE walls, so the HUD floats on the stone).
     ============================================================ */
  #shell{position:fixed; inset:0; overflow:hidden;
    background:radial-gradient(120% 90% at 50% 42%, var(--stage-hi), var(--surround) 78%);}

  /* the 4 projected dungeon walls (rebuilt by buildWalls on every layout) */
  #walls{position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden}
  #walls .lv-wall{position:absolute; transform-origin:0 0;
    background-size:100% 100%; background-repeat:no-repeat;
    image-rendering:auto; filter:brightness(1.0) contrast(1.03) saturate(.96)}
  #walls .lv-shade{position:absolute; inset:0}

  /* the embedded replay — the lit pit floor */
  #floor{position:absolute; z-index:2; overflow:hidden;
    box-shadow:0 0 calc(40*var(--u)) calc(10*var(--u)) rgba(232,163,61,.10),
               0 0 0 2px rgba(0,0,0,.55),
               inset 0 0 0 1px rgba(242,232,216,.05);
    background:#120c08}
  #floor iframe{width:100%; height:100%; border:0; display:block; background:#120c08}

  /* HUD panels ride ABOVE the walls */
  .hud{position:absolute; z-index:5; font-family:var(--pixfont)}

  /* ============================================================
     TOP WALL — match clock centered, with the (possibly long) TEAM
     NAMES flanking it in the corners. The wall band has the horizontal
     room the narrow side columns don't, so long league/policy names
     live up here. Flag + lives stay in the side-column header below.
     ============================================================ */
  #scorebug{display:flex; align-items:center; justify-content:center;
    padding:calc(6*var(--u)) calc(14*var(--u)); gap:calc(16*var(--u)); pointer-events:none}
  #scorebug > *{pointer-events:auto}
  .wallname{flex:1 1 0; min-width:0; font-family:var(--pixfont); font-size:calc(26*var(--u));
    letter-spacing:.5px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 calc(2*var(--u)) 0 var(--ink), 0 0 calc(11*var(--u)) rgba(0,0,0,.72)}
  .wallname.red{text-align:left; color:var(--red)}
  .wallname.blue{text-align:right; color:var(--blue)}
  .clock{flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:calc(3*var(--u))}
  .clock .time{font-family:var(--pixfont); font-size:calc(34*var(--u)); line-height:1; color:var(--paper);
    text-shadow:0 calc(2*var(--u)) 0 var(--ink), 0 0 calc(10*var(--u)) rgba(0,0,0,.7); font-variant-numeric:tabular-nums}
  .clock .caption{font-family:var(--finefont); font-size:calc(9*var(--u)); letter-spacing:.18em;
    text-transform:uppercase; color:var(--paper-dim); white-space:nowrap; text-shadow:0 calc(1*var(--u)) 0 #000}
  .clock.tiebreak-warn .time{color:var(--amber)}
  .clock.amb{animation:clocktick 2s ease-in-out infinite}
  @keyframes clocktick{0%,100%{opacity:.94}50%{opacity:1}}

  /* ============================================================
     KDA PLAQUES (side walls) — team header (flag + NAME inline with
     LIVES) atop the league roster + standings footer.
     ============================================================ */
  .plaque{display:flex; flex-direction:column; padding:calc(6*var(--u)) calc(10*var(--u)); pointer-events:auto}

  /* team header block: flag icon + LIVES counter. (Team NAME lives up in
     the top-wall corners — see .wallname — so long names never truncate.) */
  .team-head{display:flex; align-items:center; gap:calc(9*var(--u)); min-width:0;
    margin-bottom:calc(8*var(--u))}
  .plaque.right .team-head{flex-direction:row-reverse}
  .team-head .lives-line{display:flex; align-items:baseline; gap:calc(5*var(--u))}
  .plaque.right .team-head .lives-line{flex-direction:row-reverse}
  .lives-num{font-family:var(--pixfont); font-size:calc(20*var(--u)); line-height:1;
    color:var(--paper); flex:none; text-shadow:0 calc(2*var(--u)) 0 var(--ink), 0 0 calc(9*var(--u)) rgba(0,0,0,.7)}
  .lives-label{font-family:var(--finefont); font-size:calc(8*var(--u)); letter-spacing:.14em;
    text-transform:uppercase; color:var(--paper-dim); flex:none; text-shadow:0 calc(1*var(--u)) 0 #000}
  .team-head.leader .lives-num{animation:leaderpulse 1.9s ease-in-out infinite}
  @keyframes leaderpulse{0%,100%{text-shadow:0 calc(2*var(--u)) 0 var(--ink)}
    50%{text-shadow:0 0 calc(11*var(--u)) var(--amber)}}

  /* flag-state icon — HOME (on pedestal) / TAKEN (riding a carrier) */
  .flagicon{position:relative; width:calc(26*var(--u)); height:calc(30*var(--u)); flex:none;
    filter:drop-shadow(0 calc(1*var(--u)) calc(3*var(--u)) rgba(0,0,0,.7))}
  .flagicon svg{width:100%; height:100%; display:block}
  .flagicon .cloth{transition:transform 90ms steps(3); transform-box:fill-box; transform-origin:left center}
  .flagicon.taken .cloth{transform:scaleX(.62) skewX(-8deg)}
  .flagicon.flip{animation:flagflip 260ms steps(3); transform-box:fill-box; transform-origin:center}
  @keyframes flagflip{0%{transform:scaleY(.2)}100%{transform:scaleY(1)}}
  .khead,.krow{display:grid; align-items:center; gap:calc(5*var(--u));
    grid-template-columns:1fr calc(16*var(--u)) calc(16*var(--u)) calc(34*var(--u))}
  .khead{font-family:var(--finefont); font-size:calc(8*var(--u)); letter-spacing:.08em; text-transform:uppercase;
    color:var(--paper-dim); padding:0 calc(3*var(--u)) calc(4*var(--u)); border-bottom:1px solid rgba(242,232,216,.18)}
  .khead span:not(:first-child){text-align:center}
  .krow{font-family:var(--pixfont); font-size:calc(12*var(--u)); padding:calc(3.5*var(--u)) calc(3*var(--u));
    border-radius:calc(2*var(--u)); cursor:pointer}
  .krow:nth-child(odd){background:rgba(242,232,216,.035)}
  .krow:hover{background:rgba(242,232,216,.09)}
  .krow.dead{opacity:.42}
  .krow.pov{background:rgba(232,163,61,.16); box-shadow:inset 0 0 0 1px rgba(232,163,61,.5)}
  /* The seat # is a name DISAMBIGUATOR, not a stat: it sits glued right after the
     name's ellipsis (small gap, dimmed, tabular) so "Richard Higg… 1" reads as one
     label. It must NOT drift to the right edge where it reads as a K/D/Lives value. */
  .seatno{flex:none; font-variant-numeric:tabular-nums; color:var(--paper-dim);
    font-size:calc(10*var(--u)); opacity:.7}
  .krow .who{display:flex; align-items:center; gap:calc(3*var(--u)); min-width:0}
  /* min-width:0 lets a long name actually SHRINK + ellipsize inside the flex row;
     without it the name keeps its full nowrap width and pushes the seat # away. */
  .who .nm{min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    color:var(--paper-dim); font-size:calc(11*var(--u))}
  /* the carry heart rides a FIXED-width slot that is always present (empty when not
     carrying) so a mid-game grab never shifts the name/seat to its left. */
  .who .carry{flex:none; width:calc(10*var(--u)); text-align:center; color:var(--amber)}
  .krow .n{font-variant-numeric:tabular-nums; text-align:center}
  .krow .k{color:var(--paper)} .krow .d{color:var(--paper-dim)} .krow .c{color:var(--amber)}
  .lives{display:flex; gap:calc(2*var(--u)); justify-content:center; flex-wrap:wrap}
  .lp{width:calc(5*var(--u)); height:calc(5*var(--u)); border-radius:1px}
  .plaque.left .lp.on{background:var(--red)} .plaque.right .lp.on{background:var(--blue)}
  .lp.off{background:rgba(242,232,216,.16)}

  /* standing footer — sits directly under the roster rows (NOT pinned to the
     column bottom). Hidden entirely when there are no standings, so no empty
     divider line floats at the bottom of the column. */
  .pfoot{margin-top:calc(10*var(--u)); padding-top:calc(8*var(--u)); border-top:1px solid rgba(242,232,216,.14)}
  .pfoot:empty{display:none}
  .pfoot .lab{font-family:var(--finefont); font-size:calc(8*var(--u)); letter-spacing:.13em;
    text-transform:uppercase; color:var(--paper-dim)}
  .plaque.right .pfoot{text-align:right}
  .standline{display:flex; align-items:baseline; gap:calc(7*var(--u)); margin-top:calc(3*var(--u))}
  .plaque.right .standline{justify-content:flex-end}
  .standline .rk{font-family:var(--pixfont); font-size:calc(24*var(--u))}
  .plaque.left .rk{color:var(--red)} .plaque.right .rk{color:var(--blue)}
  .standline .sc{font-family:var(--pixfont); font-size:calc(13*var(--u)); color:var(--paper)}
  .standline .of{font-family:var(--finefont); font-size:calc(8*var(--u)); color:var(--paper-dim)}

  /* ============================================================
     TRANSPORT (bottom wall) — real designed chroma: tbar buttons +
     speed chips over a full-timeline momentum (lives-lead) graph
     with a click-to-seek track + beat markers.
     ============================================================ */
  #transport{display:flex; flex-direction:column; gap:calc(5*var(--u));
    padding:calc(8*var(--u)) calc(12*var(--u)); pointer-events:auto; justify-content:center}
  #transport.disabled{opacity:.35; pointer-events:none}
  .tbar{display:flex; align-items:center; gap:calc(5*var(--u)); flex-wrap:wrap}
  .tbtn{font-family:var(--pixfont); font-size:calc(11*var(--u)); color:var(--paper);
    background:rgba(20,14,9,.55); border:none; padding:calc(5*var(--u)) calc(8*var(--u));
    min-width:calc(26*var(--u)); cursor:pointer; line-height:1; box-shadow:0 0 calc(3*var(--u)) rgba(0,0,0,.5)}
  .tbtn:hover{background:rgba(242,232,216,.2)}
  .tbtn.on{color:var(--amber); box-shadow:inset 0 calc(-2*var(--u)) 0 var(--amber)}
  .tsep{flex:1}
  .tick-clock{font-family:var(--pixfont); font-size:calc(9*var(--u)); color:var(--paper-dim);
    font-variant-numeric:tabular-nums; white-space:nowrap}
  .speedchips{display:flex; gap:calc(2*var(--u))}
  .chip{font-family:var(--pixfont); font-size:calc(9*var(--u)); color:var(--paper-dim);
    background:rgba(20,14,9,.55); border:none; padding:calc(4*var(--u)) calc(5*var(--u));
    cursor:pointer; line-height:1}
  .chip.on{color:var(--stage-lo); background:var(--amber)}
  .scrub{position:relative; height:calc(60*var(--u)); cursor:pointer}
  /* The track/fill are the VISIBLE bar (the 60u height is only the click-catcher +
     momentum band), so a thin 5u line read as a tiny scrubber. Thicken it to a
     real broadcast seek bar with a rounded fill. */
  .scrub-track{position:absolute; left:0; right:0; top:calc(6*var(--u)); height:calc(10*var(--u));
    background:rgba(242,232,216,.16); border-radius:calc(5*var(--u))}
  .scrub-fill{position:absolute; left:0; top:calc(6*var(--u)); height:calc(10*var(--u));
    background:var(--paper); width:0; border-radius:calc(5*var(--u))}
  /* The playhead is a grabbable handle: a bright amber stem down the whole track +
     momentum band, topped with a round knob so it reads as draggable, not a hairline. */
  .scrub-head{position:absolute; top:calc(2*var(--u)); width:calc(5*var(--u)); height:calc(56*var(--u));
    background:var(--amber); transform:translateX(calc(-2.5*var(--u))); left:0; z-index:3;
    border-radius:calc(2.5*var(--u)); box-shadow:0 0 calc(4*var(--u)) rgba(232,163,61,.55)}
  .scrub-head::before{content:''; position:absolute; left:50%; top:calc(-2*var(--u));
    width:calc(13*var(--u)); height:calc(13*var(--u)); transform:translateX(-50%);
    background:var(--amber); border-radius:50%; box-shadow:0 0 calc(4*var(--u)) rgba(232,163,61,.6)}
  .momentum{position:absolute; left:0; width:100%; top:calc(16*var(--u)); height:calc(42*var(--u));
    display:block; overflow:visible}
  .momentum-label{position:absolute; left:0; top:calc(18*var(--u)); font-family:var(--finefont);
    font-size:calc(7*var(--u)); letter-spacing:.12em; color:var(--paper-dim); opacity:.5;
    pointer-events:none; z-index:2}
  .beat-marker{position:absolute; top:0; width:calc(2*var(--u)); height:calc(13*var(--u));
    transform:translateX(-1px); z-index:2}
  .beat-marker.kill{background:var(--paper-dim)}
  .beat-marker.steal{background:var(--amber)}
  .beat-marker.capture{background:var(--red)}

  /* connection status toast */
  #status{position:absolute; z-index:9; left:50%; top:calc(50% - 10px); transform:translate(-50%,-50%);
    font-family:var(--finefont); font-size:13px; color:var(--paper-dim); background:var(--ink-soft);
    padding:8px 16px; border-radius:20px; display:none}
  #status.show{display:block}
</style>
</head>
<body>
<div id="shell">
  <div id="walls"></div>
  <div id="floor"><iframe id="game" title="CTF replay"></iframe></div>

  <!-- top wall: just the match clock, centered -->
  <div id="scorebug" class="hud">
    <div class="wallname red" id="name-red">RED</div>
    <div class="clock amb" id="clock">
      <div class="time" id="clock-time">0:00</div>
      <div class="caption" id="clock-caption">Warming up</div>
    </div>
    <div class="wallname blue" id="name-blue">BLUE</div>
  </div>

  <div class="plaque left hud" id="kda-red">
    <div class="team-head red" data-team="red">
      <div class="flagicon" id="flag-red"></div>
      <div class="lives-line">
        <span class="lives-label">Lives</span>
        <span class="lives-num" id="lives-red">—</span>
      </div>
    </div>
    <div class="khead"><span>Name</span><span>K</span><span>D</span><span>Lives</span></div>
    <div id="rows-red"></div>
    <div class="pfoot" id="foot-red"></div>
  </div>

  <div class="plaque right hud" id="kda-blue">
    <div class="team-head blue" data-team="blue">
      <div class="flagicon" id="flag-blue"></div>
      <div class="lives-line">
        <span class="lives-label">Lives</span>
        <span class="lives-num" id="lives-blue">—</span>
      </div>
    </div>
    <div class="khead"><span>Name</span><span>K</span><span>D</span><span>Lives</span></div>
    <div id="rows-blue"></div>
    <div class="pfoot" id="foot-blue"></div>
  </div>

  <div id="transport" class="hud">
    <div class="tbar">
      <button class="tbtn" id="btn-restart" title="Restart (,)">⟲</button>
      <button class="tbtn" id="btn-back" title="Back one tick (b)">◂|</button>
      <button class="tbtn" id="btn-play" title="Play / pause (space)">▶</button>
      <button class="tbtn" id="btn-fwd" title="Skip +5s (.)">+5s</button>
      <button class="tbtn" id="btn-end" title="Jump to end (e)">|▸</button>
      <button class="tbtn" id="btn-loop" title="Loop (r)">↻</button>
      <span class="tick-clock" id="tick-clock">0 / 0</span>
      <span class="tsep"></span>
      <div class="speedchips" id="speedchips"></div>
    </div>
    <div class="scrub" id="scrub">
      <svg class="momentum" id="momentum" viewBox="0 0 1000 100"
           preserveAspectRatio="none" aria-hidden="true"></svg>
      <span class="momentum-label">LIVES LEAD</span>
      <div class="scrub-track"></div>
      <div class="scrub-fill" id="scrub-fill"></div>
      <div class="scrub-head" id="scrub-head"></div>
    </div>
  </div>

  <div id="status">connecting…</div>
</div>

<script>
(function(){
  'use strict';
  var $ = function(id){ return document.getElementById(id); };
  var RED='#e0523a', BLUE='#3f7cc4', AMBER='#e8a33d', PAPER='#f2e8d8';
  // Pre-stream defaults only: each embedded replay posts its board's real
  // native size on every frame (the game supports multiple map sizes), and
  // the stage re-layouts when it changes.
  var BOARD_W=1235, BOARD_H=659, BOARD_ASPECT=BOARD_W/BOARD_H;
  function syncBoardAspect(s){
    if (!s || !(s.boardW > 1) || !(s.boardH > 1)) return;
    var aspect = s.boardW / s.boardH;
    if (Math.abs(aspect - BOARD_ASPECT) < 0.001) return;
    BOARD_W = s.boardW; BOARD_H = s.boardH; BOARD_ASPECT = aspect;
    layout();
  }
  var SPEEDS=[1,2,3,4,8,16];
  var FPS=24;
  var MAXLIVES=3;   // per player (3 lives each); refined up if the stream disagrees

  // Proxy-aware route base. Observatory serves this shell (and every /client/*
  // asset + the embedded board) behind a per-session proxy prefix, e.g.
  //   /v2/coworlds/replays/<key>/sessions/<id>/proxy/client/replay
  // so root-relative paths ("/client/...") would drop the whole prefix and 404.
  // Strip the trailing "/client/<page>" to recover the prefix ("" when served
  // bare locally); every asset + the iframe src hang off it. Mirrors the board
  // client, which strips "/client/replay" the same way to build its ws path.
  var ROUTE_BASE = location.pathname.replace(/\/client\/[^/]*$/, "");

  // dungeon-wall textures (nanobanana generations, served as static assets so
  // the shell stays small and editable). Wide tex for top/bottom, tall for sides.
  var WALL_H = ROUTE_BASE + "/client/art/walls/wall_h.jpg";
  var WALL_V = ROUTE_BASE + "/client/art/walls/wall_v.jpg";

  // ---- URL params: replay uri + Observatory-injected standings -------------
  var params = new URLSearchParams(location.search);
  var replayUri = params.get('uri') || '';
  // standings: base64/JSON of {division, competitors:{red,blue}, ladder:[{name,rank,score,you}]}
  var standings = null;
  try {
    var st0 = params.get('standings');
    if (st0) standings = JSON.parse(decodeURIComponent(escape(atob(st0))));
  } catch(e){ standings = null; }

  // ---- build the embedded replay src (board-only embed mode) ---------------
  // Same-prefix as the shell so the board's own websocket (derived from its
  // location.pathname) stays inside the session proxy.
  (function(){
    var src = ROUTE_BASE + '/client/replay?embed=1';
    if (replayUri) src += '&uri=' + encodeURIComponent(replayUri);
    $('game').src = src;
  })();

  // ==========================================================================
  //  WALL GEOMETRY — projective homography, one shared vanishing point.
  //  Each wall is the trapezoid from a SCREEN edge (outer, near) to the matching
  //  BOARD edge (inner, far). Textures are oriented GRAVITY-UP: floor edge toward
  //  the bottom of the screen, arches upright, so no wall is upside-down or
  //  sideways. Adjacent walls share the screen-corner→board-corner diagonal.
  // ==========================================================================
  function adj(m){return [m[4]*m[8]-m[5]*m[7],m[2]*m[7]-m[1]*m[8],m[1]*m[5]-m[2]*m[4],
    m[5]*m[6]-m[3]*m[8],m[0]*m[8]-m[2]*m[6],m[2]*m[3]-m[0]*m[5],
    m[3]*m[7]-m[4]*m[6],m[1]*m[6]-m[0]*m[7],m[0]*m[4]-m[1]*m[3]];}
  function mul(a,b){var c=[];for(var i=0;i<3;i++)for(var j=0;j<3;j++){var s=0;
    for(var k=0;k<3;k++)s+=a[3*i+k]*b[3*k+j];c[3*i+j]=s;}return c;}
  function mv(m,v){return [m[0]*v[0]+m[1]*v[1]+m[2]*v[2],m[3]*v[0]+m[4]*v[1]+m[5]*v[2],m[6]*v[0]+m[7]*v[1]+m[8]*v[2]];}
  function basis(x1,y1,x2,y2,x3,y3,x4,y4){var m=[x1,x2,x3,y1,y2,y3,1,1,1];
    var v=mv(adj(m),[x4,y4,1]);return mul(m,[v[0],0,0,0,v[1],0,0,0,v[2]]);}
  function proj(sw,sh,d0x,d0y,d1x,d1y,d2x,d2y,d3x,d3y){
    var s=basis(0,0,sw,0,0,sh,sw,sh), d=basis(d0x,d0y,d1x,d1y,d2x,d2y,d3x,d3y);
    var t=mul(d,adj(s));for(var i=0;i<9;i++)t[i]/=t[8];
    return 'matrix3d('+[t[0],t[3],0,t[6], t[1],t[4],0,t[7], 0,0,1,0, t[2],t[5],0,t[8]].join(',')+')';
  }
  var wallsEl = $('walls');
  function buildWalls(bx,by,bw,bh,vw,vh){
    var bR=bx+bw, bB=by+bh;
    // per-wall shade: a STEEP shadowbox — dark hugs the outer/near screen edge and
    // falls off fast, so by the inner/board edge the stone is at floor brightness
    // (only a faint shadow remains) and the wall reads as the SAME world as the
    // floor, not a separate panel. The concentrated outer band still lets the HUD
    // tables/scorebug pop off the stone.
    var g='rgba(5,3,2,.86)', mid='rgba(8,5,3,.22)', lit='rgba(8,5,3,0)';
    // src rect corners: TL(0,0)->d0, TR(sw,0)->d1, BL(0,sh)->d2, BR(sw,sh)->d3.
    function wall(tex,sw,sh, d0x,d0y,d1x,d1y,d2x,d2y,d3x,d3y, grad){
      return '<div class="lv-wall" style="background-image:url(\''+tex+'\');width:'+sw+'px;height:'+sh+
        'px;transform:'+proj(sw,sh,d0x,d0y,d1x,d1y,d2x,d2y,d3x,d3y)+
        '"><div class="lv-shade" style="background:'+grad+'"></div></div>';
    }
    var out='';
    // TOP: unchanged (reads correctly). tex top→screen top, tex floor→board top.
    out += wall(WALL_H, vw, by,        0,0,  vw,0,  bx,by, bR,by,
                'linear-gradient(to top,'+lit+' 35%,'+mid+' 62%,'+g+')');
    // BOTTOM: FLIPPED over its x-axis (was upside-down). Same trapezoid region;
    //   src top row → outer/screen edge, src bottom row → inner/board edge.
    out += wall(WALL_H, vw, vh-bB,     0,vh, vw,vh, bx,bB, bR,bB,
                'linear-gradient(to bottom,'+g+','+mid+' 38%,'+lit+' 65%)');
    // LEFT: rotated 90° COUNTER-CLOCKWISE within its trapezoid.
    //   Because the tex is rotated, the DEPTH axis (screen→floor) is the source
    //   Y axis: y=0→screen edge (outer,dark), y=sh→board edge (inner,light).
    out += wall(WALL_V, bx, vh,        0,vh, 0,0,   bx,bB, bx,by,
                'linear-gradient(to top,'+lit+' 35%,'+mid+' 62%,'+g+')');
    // RIGHT: rotated 90° CLOCKWISE within its trapezoid.
    out += wall(WALL_V, vw-bR, vh,     vw,0, vw,vh, bR,by, bR,bB,
                'linear-gradient(to top,'+lit+' 35%,'+mid+' 62%,'+g+')');
    wallsEl.innerHTML = out;
  }

  // ==========================================================================
  //  LAYOUT — maximize the board; walls take only the leftover (kept thin).
  // ==========================================================================
  function clamp(a,x,b){return Math.max(a,Math.min(b,x));}
  var lastLayout = null;
  function layout(){
    var vw = window.innerWidth, vh = window.innerHeight;
    // minimum wall thickness that still fits the HUD (scorebug/KDA/transport).
    var sideMin = clamp(150, vw*0.135, 300);
    var topMin  = clamp(56,  vh*0.08,  120);
    var botMin  = clamp(88,  vh*0.135, 175);
    var availW = Math.max(1, vw - 2*sideMin);
    var availH = Math.max(1, vh - topMin - botMin);
    var bw, bh;
    if (availW/availH > BOARD_ASPECT){ bh=availH; bw=Math.round(bh*BOARD_ASPECT); }
    else { bw=availW; bh=Math.round(bw/BOARD_ASPECT); }
    var bx = Math.round((vw-bw)/2);
    var by = Math.round(topMin + (availH-bh)/2);
    var bR = bx+bw, bB = by+bh;

    // one HUD unit scales with board width (authored ~ 760px reference).
    var u = clamp(0.62, bw/1180, 1.35);
    document.documentElement.style.setProperty('--u', u+'px');

    // place the floor (embedded replay)
    var floor = $('floor');
    floor.style.left=bx+'px'; floor.style.top=by+'px'; floor.style.width=bw+'px'; floor.style.height=bh+'px';

    // build the walls to these exact edges
    buildWalls(bx,by,bw,bh,vw,vh);

    // ---- position flat HUD panels over the wall zones ----
    // scorebug spans the FULL viewport so each team plate hugs its true top
    // corner — vertically over the side-wall column that holds its roster table
    // below (red↔left table, blue↔right table). Its horizontal padding matches
    // the tables' (10u) so the plates line up with the table columns.
    var sb=$('scorebug'); sb.style.left='0px'; sb.style.width=vw+'px'; sb.style.top='0px'; sb.style.height=by+'px';
    var kr=$('kda-red');  kr.style.left='0px';  kr.style.width=bx+'px';       kr.style.top=by+'px'; kr.style.height=bh+'px';
    var kb=$('kda-blue'); kb.style.right='0px'; kb.style.width=(vw-bR)+'px';  kb.style.top=by+'px'; kb.style.height=bh+'px';
    var tp=$('transport'); tp.style.left=bx+'px'; tp.style.width=bw+'px'; tp.style.top=bB+'px'; tp.style.height=(vh-bB)+'px';

    lastLayout = {vw:vw,vh:vh,bx:bx,by:by,bw:bw,bh:bh};
  }
  window.addEventListener('resize', layout);

  // ==========================================================================
  //  FRAME STREAM — the embedded replay postMessages each parsed state here.
  // ==========================================================================
  var lastState=null, maxTick=1, lastTick=-1;
  window.addEventListener('message', function(ev){
    var m=ev.data; if(!m || m.src!=='ctf-replay') return;
    if(m.type==='frame'){ syncBoardAspect(m.data); onFrame(m.data); }
  });

  // ---- names (ported from the broadcast client, 1:1) -----------------------
  function teamName(s, team, fallback){
    // The headline is the POLICY name, not the color. In a hosted league every
    // player on a side is the SAME policy → show it. In local self-play each bot
    // has a distinct generated name (no shared identity) → fall back to color.
    if (!s.roster) return fallback;
    var name=null, mixed=false;
    for (var i=0;i<s.roster.length;i++){
      var p=s.roster[i];
      if (p.team!==team) continue;
      // Strip the per-seat " (N)" suffix the hosted runtime appends to
      // disambiguate the SAME policy's multiple connections ("softmaxwell (2)",
      // "softmaxwell (7)"…), so all seats of one policy collapse to a single
      // shared name for the headline. The killfeed shows the full per-seat name
      // because it colors names per event and never needs them to match; the
      // headline needs one shared identity, so this suffix was tripping the
      // "mixed" check and pinning the header to the color. Distinct local
      // self-play names (Player1, Player2) have no such suffix, so they still
      // differ and correctly fall back to the color.
      var nm=String(p.name||'').replace(/\s*\(\d+\)\s*$/, '');
      if (name===null) name=nm;
      else if (nm!==name){ mixed=true; break; }
    }
    if (name===null || mixed || name==='') return fallback;
    return teamHeadline(name);
  }
  function teamHeadline(n){
    n=String(n||'');
    var at=n.indexOf('@'); if (at>0) n=n.slice(0,at);
    n=n.replace(/_/g,' ').trim();
    return (n||'?').toUpperCase();
  }
  function rosterName(s, slot){
    if (!s.roster) return '#'+slot;
    for (var i=0;i<s.roster.length;i++) if (s.roster[i].s===slot) return s.roster[i].name||('#'+slot);
    return '#'+slot;
  }
  function shortName(n){
    // Strip any @domain, then let the .nm cell's CSS ellipsis do the visual
    // truncation — the char cap is only a runaway guard so a pathologically
    // long name can't blow out the flex row. No mid-word hard cut like before.
    n=String(n||'');
    var at=n.indexOf('@'); if (at>0) n=n.slice(0,at);
    if (n.length>28) n=n.slice(0,27)+'…';
    return n||'?';
  }
  function esc(x){return String(x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function setName(id, txt){ var el=$(id); if (el.textContent!==txt) el.textContent=txt; }

  // ---- flag icon svg (HOME/TAKEN are the only two states) ------------------
  // The carrier's identity is shown by the ♥ marker in the roster table, so the
  // flag icon carries no name tag here — just the home/taken cloth state.
  function buildFlag(el, color){
    el.innerHTML =
      '<svg viewBox="0 0 26 30" aria-hidden="true">' +
      '<rect x="4" y="2" width="2" height="26" fill="#2a1f16"/>' +
      '<g class="cloth"><path d="M6 3 L22 3 L18 9 L22 15 L6 15 Z" fill="'+color+'"/></g>' +
      '<rect x="1" y="26" width="10" height="3" fill="#8a7f72"/>' +
      '</svg>';
  }
  buildFlag($('flag-red'), RED);
  buildFlag($('flag-blue'), BLUE);

  function updateFlag(id, team, tstate, s){
    var el=$(id);
    var taken = tstate.flag==='taken';
    var was = el.classList.contains('taken');
    el.classList.toggle('taken', taken);
    if (was!==taken){ el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); }
  }

  function renderScorebug(s){
    var tr=s.teams||{};
    var red=tr.red||{}, blue=tr.blue||{};
    var rl=red.lives||0, bl=blue.lives||0;

    setName('name-red',  teamName(s,'red','RED'));
    setName('name-blue', teamName(s,'blue','BLUE'));
    $('lives-red').textContent  = (s.teams&&s.teams.red)?rl:'—';
    $('lives-blue').textContent = (s.teams&&s.teams.blue)?bl:'—';

    updateFlag('flag-red',  'red',  red,  s);
    updateFlag('flag-blue', 'blue', blue, s);

    var rp=document.querySelector('.team-head.red');
    var bp=document.querySelector('.team-head.blue');
    if(rp) rp.classList.toggle('leader', rl-bl>=3 && s.ph==='playing');
    if(bp) bp.classList.toggle('leader', bl-rl>=3 && s.ph==='playing');
  }

  // ---- clock ---------------------------------------------------------------
  function fmt(sec){ sec=Math.max(0,Math.round(sec)); var m=Math.floor(sec/60), r=sec%60; return m+':'+(r<10?'0':'')+r; }
  function renderClock(s){
    var timeEl=$('clock-time'), capEl=$('clock-caption'), clk=$('clock');
    if (s.ph==='lobby'){
      timeEl.textContent = s.lob>0 ? (':'+(s.lob<10?'0':'')+s.lob) : '--';
      capEl.textContent  = s.lob>0 ? 'Starting in' : 'Waiting for players';
      clk.classList.remove('tiebreak-warn');
    } else if (s.ph==='gameover'){
      timeEl.textContent='FINAL';
      // During the server's end-segment hold the board end-card counts down to
      // the loop restart; mirror it up here so the clock never reads stalled.
      capEl.textContent = (s.lp && s.hold>0) ? ('Replaying in '+s.hold+'s') : 'Game over';
      clk.classList.remove('tiebreak-warn');
    } else {
      // Honest countdown to the scheduled draw limit (st + mt = gameStartTick +
      // maxTicks), NOT to the replay's last tick. A game decided early by a
      // capture/wipe freezes the clock at whatever was left and flips to FINAL,
      // so only a real grind to the limit ever reaches 0:00. Fall back to the
      // replay span when no limit is configured (mt <= 0). Mirrors
      // replay_broadcast.html renderClock.
      var end = (s.mt && s.mt > 0) ? ((s.st || 0) + s.mt) : s.mx;
      var remain = Math.max(0, (end - s.t))/FPS;
      timeEl.textContent = fmt(remain);
      capEl.textContent  = 'Time left';
      clk.classList.toggle('tiebreak-warn', remain<=30);
    }
  }

  // ---- KDA plaques (league-specific) ---------------------------------------
  // Rows are built as PERSISTENT DOM keyed by seat slot and only re-created when
  // the roster set changes; every other frame updates text/classes IN PLACE. The
  // old code rewrote el.innerHTML ~24×/s, so a POV click whose mousedown→mouseup
  // straddled a re-render landed on a node that no longer existed and the browser
  // never fired `click` — POV selection felt unreliable even on the first try.
  // (Same cached-DOM discipline the board's squad pips use.)
  function makeRow(el, slot){
    var row=document.createElement('div');
    row.className='krow'; row.setAttribute('data-slot', slot);
    var who=document.createElement('span'); who.className='who';
    var nm=document.createElement('span'); nm.className='nm';
    var seatno=document.createElement('span'); seatno.className='seatno';
    var carry=document.createElement('span'); carry.className='carry';
    who.appendChild(nm); who.appendChild(seatno); who.appendChild(carry);
    var k=document.createElement('span'); k.className='n k';
    var d=document.createElement('span'); d.className='n d';
    var lives=document.createElement('span'); lives.className='lives';
    row.appendChild(who); row.appendChild(k); row.appendChild(d); row.appendChild(lives);
    el.appendChild(row);
    return {row:row, nm:nm, seatno:seatno, carry:carry, k:k, d:d, lives:lives, pipKey:''};
  }
  function setLivePips(cell, n, max){
    var key=n+'/'+max;
    if (cell.pipKey===key) return;      // only rebuild when lives or max changed
    cell.pipKey=key;
    var o='';
    for (var i=0;i<max;i++) o+='<span class="lp '+(i<n?'on':'off')+'"></span>';
    cell.lives.innerHTML=o;
  }
  function renderRows(s, team, el){
    var r=(s.roster||[]).filter(function(p){return p.team===team;}).slice().sort(function(a,b){return a.s-b.s;});
    var mx=MAXLIVES; r.forEach(function(p){ if(p.lives>mx) mx=p.lives; });
    var key=r.map(function(p){return p.s;}).join(',');
    if (el._rowKey!==key){          // roster set changed → (re)build the row DOM once
      el.innerHTML=''; el._cells={};
      r.forEach(function(p){ el._cells[p.s]=makeRow(el, p.s); });
      el._rowKey=key;
    }
    var cells=el._cells;
    r.forEach(function(p,idx){
      var c=cells[p.s]; if(!c) return;
      var seat=idx+1;
      // Row label = the PER-PLAYER name the board units carry (via rosterName)
      // then the seat number as a small disambiguator, e.g. "Richard Higg… 1".
      // No team color: replays identify players by name, and the trailing seat
      // disambiguates teammates who share one policy name. Team identity rides
      // the wall-corner headline above the table.
      var who=shortName(rosterName(s, p.s));
      if (c.nm.textContent!==who) c.nm.textContent=who;
      var seatTxt=String(seat);
      if (c.seatno.textContent!==seatTxt) c.seatno.textContent=seatTxt;
      var heart=p.carry?'♥':'';
      if (c.carry.textContent!==heart) c.carry.textContent=heart;
      var kTxt=String(p.k||0); if (c.k.textContent!==kTxt) c.k.textContent=kTxt;
      var dTxt=String(p.d||0); if (c.d.textContent!==dTxt) c.d.textContent=dTxt;
      setLivePips(c, p.lives||0, mx);
      c.row.classList.toggle('dead', !p.alive);
      c.row.classList.toggle('pov', s.pov!=null && s.pov===p.s);
    });
  }

  function renderStandings(){
    function foot(team, elId){
      var el=$(elId);
      if(!standings || !standings.competitors){ el.innerHTML=''; return; }
      var name = standings.competitors[team];
      var row = (standings.ladder||[]).filter(function(r){return r.name===name;})[0];
      if(!row){ el.innerHTML=''; return; }
      var tot = (standings.ladder||[]).length;
      el.innerHTML = '<div class="lab">'+esc(standings.division||'Division')+'</div>'+
        '<div class="standline"><span class="rk">#'+row.rank+'</span>'+
        '<span class="sc">'+(row.score!=null? Number(row.score).toFixed(2):'—')+'</span>'+
        '<span class="of">of '+tot+' · EWMA</span></div>';
    }
    foot('red','foot-red');
    foot('blue','foot-blue');
  }

  // ---- transport (buttons + speed chips + scrubber) ------------------------
  function renderTransport(s){
    $('transport').classList.toggle('disabled', !s.en);
    $('btn-play').textContent = s.pl ? '❘❘' : '▶';
    $('btn-loop').classList.toggle('on', !!s.lp);
    SPEEDS.forEach(function(sp){ var b=speedChipEls[sp]; if(b) b.classList.toggle('on', sp===s.sp); });

    // scrubber x-axis skips the dead lobby: spans [startTick, maxTick].
    var st = Math.max(0, s.st||0);
    var mx = Math.max(st+1, s.mx||1);
    var span = mx-st;
    var frac = Math.min(1, Math.max(0, (s.t-st)/span));
    $('scrub-fill').style.width = (frac*100)+'%';
    $('scrub-head').style.left  = (frac*100)+'%';
    $('tick-clock').textContent = Math.max(0, s.t-st)+' / '+span;

    renderBeatMarkers(st, mx);
    renderMomentum();
  }

  // ---- scrubber beat markers -----------------------------------------------
  var scrubEl=$('scrub');
  var seenMarkers={}, pendingMarkers=[];
  function markBeat(tick, kind){
    var mk=tick+'|'+kind;
    if (seenMarkers[mk]) return;
    seenMarkers[mk]={tick:tick,kind:kind};
    pendingMarkers.push({tick:tick,kind:kind});
  }
  function renderBeatMarkers(st, mx){
    if (!pendingMarkers.length) return;
    var span=Math.max(1, mx-st);
    pendingMarkers.forEach(function(m){
      var el=document.createElement('div');
      el.className='beat-marker '+m.kind;
      el.style.left = (Math.min(1,Math.max(0,(m.tick-st)/span))*100)+'%';
      scrubEl.appendChild(el);
    });
    pendingMarkers=[];
  }

  // ---- momentum graph (lives-lead over the WHOLE timeline) -----------------
  var VBW=1000, VBH=100, MID=50, MOM_SVGNS='http://www.w3.org/2000/svg';
  var momentumSeen={}, momentumDirty=true, fullLeadSeries=null, momentumSamples=[];
  function ingestLeadSeries(s){
    if (!s.lead || fullLeadSeries) return;
    fullLeadSeries = s.lead.map(function(p){ return {t:p[0], diff:p[1]}; });
    momentumDirty=true;
  }
  function recordMomentum(s){
    if (fullLeadSeries) return;
    if (s.ph!=='playing' && s.ph!=='gameover') return;
    if (momentumSeen[s.t]) return;
    momentumSeen[s.t]=true;
    var tr=s.teams||{};
    var diff = ((tr.red&&tr.red.lives)||0) - ((tr.blue&&tr.blue.lives)||0);
    momentumSamples.push({t:s.t, diff:diff});
    momentumDirty=true;
  }
  function renderMomentum(){
    var el=$('momentum');
    var samples = fullLeadSeries || momentumSamples;
    if (!lastState || !samples.length){ if(!samples.length) el.innerHTML=''; return; }
    if (!momentumDirty && el.childNodes.length) return;
    momentumDirty=false;
    var st = Math.max(0, lastState.st||0);
    var mx = Math.max(st+1, lastState.mx||1);
    var maxPos=1, maxNeg=1;
    samples.forEach(function(m){ if(m.diff>maxPos)maxPos=m.diff; if(-m.diff>maxNeg)maxNeg=-m.diff; });
    var pts = samples.slice().sort(function(a,b){return a.t-b.t;});
    function xOf(t){ return Math.min(1,Math.max(0,(t-st)/(mx-st)))*VBW; }
    function yOf(d){ return d>=0 ? MID-(d/maxPos)*(MID-2) : MID+(-d/maxNeg)*(MID-2); }
    var line='', k;
    for (k=0;k<pts.length;k++){
      var x=xOf(pts[k].t), y=yOf(pts[k].diff);
      if (k===0) line+='M '+x.toFixed(1)+' '+y.toFixed(1);
      else line+=' H '+x.toFixed(1)+' V '+y.toFixed(1);
    }
    var lastX=xOf(pts[pts.length-1].t);
    var area = line+' L '+lastX.toFixed(1)+' '+MID+' L '+xOf(pts[0].t).toFixed(1)+' '+MID+' Z';
    el.setAttribute('viewBox','0 0 '+VBW+' '+VBH);
    el.innerHTML='';
    var defs=document.createElementNS(MOM_SVGNS,'defs');
    defs.innerHTML =
      '<linearGradient id="momfill" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="'+VBH+'">'+
      '<stop offset="0%" stop-color="'+RED+'" stop-opacity="0.8"/>'+
      '<stop offset="50%" stop-color="'+RED+'" stop-opacity="0.28"/>'+
      '<stop offset="50%" stop-color="'+BLUE+'" stop-opacity="0.28"/>'+
      '<stop offset="100%" stop-color="'+BLUE+'" stop-opacity="0.8"/>'+
      '</linearGradient>';
    el.appendChild(defs);
    var bg=document.createElementNS(MOM_SVGNS,'rect');
    bg.setAttribute('x',0); bg.setAttribute('y',0); bg.setAttribute('width',VBW); bg.setAttribute('height',VBH);
    bg.setAttribute('fill','rgba(11,7,4,0.55)');
    el.appendChild(bg);
    var midln=document.createElementNS(MOM_SVGNS,'line');
    midln.setAttribute('x1',0); midln.setAttribute('y1',MID); midln.setAttribute('x2',VBW); midln.setAttribute('y2',MID);
    midln.setAttribute('stroke','rgba(242,232,216,0.22)'); midln.setAttribute('stroke-width','0.8');
    el.appendChild(midln);
    var areaEl=document.createElementNS(MOM_SVGNS,'path');
    areaEl.setAttribute('d',area); areaEl.setAttribute('fill','url(#momfill)'); areaEl.setAttribute('stroke','none');
    el.appendChild(areaEl);
    var lineEl=document.createElementNS(MOM_SVGNS,'path');
    lineEl.setAttribute('d',line); lineEl.setAttribute('fill','none'); lineEl.setAttribute('stroke',PAPER);
    lineEl.setAttribute('stroke-width','1.5'); lineEl.setAttribute('stroke-opacity','0.95');
    lineEl.setAttribute('vector-effect','non-scaling-stroke');
    el.appendChild(lineEl);
  }

  // ==========================================================================
  //  onFrame — paint every wall-mounted HUD from the streamed state.
  // ==========================================================================
  function onFrame(s){
    lastState=s;
    maxTick = Math.max(1, s.mx||s.mt||1);

    // Detect a jump (seek/loop) — nothing transient to clear here, but we keep
    // beat markers collected so far (markBeat dedups by tick|kind anyway).
    var jumped = (s.t < lastTick) || (lastTick>=0 && s.t-lastTick > (s.sp||1)*4+2);

    renderScorebug(s);
    renderClock(s);
    renderTransport(s);

    // KDA rosters (league-specific); team name/lives ride the header above them
    renderRows(s,'red',  $('rows-red'));
    renderRows(s,'blue', $('rows-blue'));
    renderStandings();

    // beat markers from events; momentum from lead series
    if (s.events && s.events.length && !jumped){
      for (var i=0;i<s.events.length;i++){
        var e=s.events[i];
        if (e.k==='kill') markBeat(e.t,'kill');
        else if (e.k==='steal') markBeat(e.t,'steal');
        else if (e.k==='capture') markBeat(e.t,'capture');
      }
    }
    ingestLeadSeries(s);
    recordMomentum(s);

    lastTick = s.t;
    hideStatus();
  }

  // ==========================================================================
  //  TRANSPORT DRIVE — relay commands to the embedded replay (single WS, sync).
  // ==========================================================================
  function sendCmd(cmd){ var f=$('game'); if(f && f.contentWindow) f.contentWindow.postMessage({src:'ctf-shell',type:'cmd',cmd:cmd},'*'); }
  function sendSeek(tick){ var f=$('game'); if(f && f.contentWindow) f.contentWindow.postMessage({src:'ctf-shell',type:'seek',tick:tick},'*'); }
  function sendPov(slot){ var f=$('game'); if(f && f.contentWindow) f.contentWindow.postMessage({src:'ctf-shell',type:'pov',slot:slot},'*'); }
  function togglePov(slot){ if (lastState && lastState.pov===slot) sendPov(-1); else sendPov(slot); }

  // transport buttons → command chars (same vocabulary the local transport uses)
  $('btn-restart').addEventListener('click', function(){ sendCmd(','); });
  $('btn-back').addEventListener('click',    function(){ sendCmd('b'); });
  $('btn-play').addEventListener('click',    function(){ sendCmd(' '); });
  $('btn-fwd').addEventListener('click',     function(){ sendCmd('.'); });
  $('btn-end').addEventListener('click',     function(){ sendCmd('e'); });
  $('btn-loop').addEventListener('click',    function(){ sendCmd('r'); });

  // speed chips (absolute set: single-char speed commands; 16× maps to '6')
  var speedChipEls={};
  (function(){
    var host=$('speedchips'), map={1:'1',2:'2',3:'3',4:'4',8:'8',16:'6'};
    SPEEDS.forEach(function(v){
      var b=document.createElement('button'); b.className='chip'; b.textContent=v+'×';
      b.setAttribute('aria-label', v+'x speed');
      b.addEventListener('click', function(){ if(map[v]) sendCmd(map[v]); });
      host.appendChild(b); speedChipEls[v]=b;
    });
  })();

  // click-to-seek on the scrub track (maps onto the shown [startTick, maxTick] axis)
  $('scrub').addEventListener('click', function(ev){
    if (!lastState || !lastState.en) return;
    var r=this.getBoundingClientRect();
    var frac=clamp(0,(ev.clientX-r.left)/r.width,1);
    var st=Math.max(0, lastState.st||0);
    var mx=Math.max(st+1, lastState.mx||1);
    sendSeek(st + Math.round(frac*(mx-st)));
  });

  // clicking a KDA row → POV lens on that player (toggles)
  ['rows-red','rows-blue'].forEach(function(id){
    $(id).addEventListener('click', function(ev){
      var row=ev.target.closest('.krow'); if(!row) return;
      togglePov(parseInt(row.getAttribute('data-slot'),10));
    });
  });

  var statusTimer=null;
  function hideStatus(){ $('status').classList.remove('show'); if(statusTimer){clearTimeout(statusTimer);statusTimer=null;} }
  function showStatus(t){ $('status').textContent=t; $('status').classList.add('show'); }
  showStatus('loading replay…');
  statusTimer=setTimeout(function(){ if(!lastState) showStatus('waiting for replay frames…'); }, 4000);

  layout();
})();
</script>
</body>
</html>
