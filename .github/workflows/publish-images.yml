name: Publish images

# Builds and pushes the game and baseline-bot images to GHCR.
# Manual (workflow_dispatch) or on a version tag, so ordinary pushes to main
# do not republish images. The manifest references:
#   ghcr.io/metta-ai/coworld-ctf           (game)
#   ghcr.io/metta-ai/coworld-ctf-baseline  (baseline bot)
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: coworld-ctf
            dockerfile: Dockerfile
          - image: coworld-ctf-baseline
            dockerfile: players/baseline/Dockerfile
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/metta-ai/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
